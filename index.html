const cardDetails={
q01:"**Schall** ist ein physikalisches Phänomen, das die Ausbreitung kleiner zeitlicher Schwankungen in einem elastischen Medium beschreibt. Voraussetzung ist stets das Vorhandensein eines solchen Mediums — ob Gas, Flüssigkeit oder Festkörper. Die Ausbreitung erfolgt wellenförmig, wobei zwar **Energie**, aber keine **Materie** transportiert wird. Schall kann dabei als Fluidschall (z.B. Luft- oder Wasserschall) oder als Körperschall in Festkörpern auftreten. Eng verwandt, aber begrifflich abgegrenzt sind **Schwingungen** (keine Ausbreitung im Medium) und **Strömungen** (Materie wird transportiert).\n\n> \"Physikalisch gesehen bezeichnet der Begriff Schall kleine, zeitliche Schwankungen des Drucks oder mechanischer Spannungen, die sich in einem Medium ausbreiten.\"\n\n> \"Zusammengefasst ist Schall also ein physikalisches Phänomen, bei dem sich kleine, zeitliche Schwankungen von mechanischen Zustandsgrößen in einem elastischen Medium in Form einer Energie transportierenden Welle ausbreiten.\"\n\n> **Quelle:** Skript Kap. 1.2, S. 2–3",
q02:"Die Unterscheidung in **Hörschall**, **Infraschall** und **Ultraschall** bezieht sich auf die Frequenz der Dichteschwankungen und deren Wahrnehmbarkeit durch den Menschen. **Hörschall** umfasst den Frequenzbereich, der vom menschlichen Gehör wahrgenommen werden kann, also etwa 16 Hz bis 16.000–20.000 Hz. **Infraschall** bezeichnet Schall mit Frequenzen unterhalb der menschlichen Hörschwelle, also zu tief für die Wahrnehmung. **Ultraschall** liegt oberhalb des hörbaren Bereichs und findet z.B. in der Ultraschallreinigung oder medizinischen Diagnostik Anwendung. Die Einteilung ist somit anthropozentrisch und richtet sich nach den Grenzen des menschlichen Gehörs.\n\n> \"Da oft insbesondere der vom Menschen wahrnehmbare Schall von Interesse ist, werden anhand der Frequenz der Dichteschwankungen Hörschall (Frequenzen durch den Menschen wahrnehmbar), Infraschall (Frequenzen zu tief) und Ultraschall (Frequenzen zu hoch für die menschliche Wahrnehmung) unterschieden.\"\n\n> **Quelle:** Skript Kap. 1.2, S. 3",
q03:"**Schallschnelle** und **Schallgeschwindigkeit** sind zwei grundlegend verschiedene Größen der Akustik. Die Schallschnelle $ṽ$ beschreibt die lokale Wechselbewegungsgeschwindigkeit einzelner Teilchen des Mediums, die durch die Druckdifferenzen bei der Schallausbreitung hervorgerufen wird. Sie ist eine vektorielle Größe und typischerweise extrem klein — an der Hörschwelle etwa 60 nm/s. Die **Schallgeschwindigkeit** $c$ hingegen ist die Geschwindigkeit, mit der sich die Druck- und Dichtestörungen durch das Medium fortbewegen. Sie ist eine skalare **Materialeigenschaft** und beträgt in Luft bei 20 °C ca. 343 m/s. Diese beiden Größen dürfen keinesfalls verwechselt werden.\n\n> \"Die (Wechsel-) Bewegungsgeschwindigkeit einzelner Teilchen des Mediums ist neben dem Schalldruck eine weitere wichtige Größe zur Beschreibung von Schallwellen und wird Schallschnelle genannt. Sie unterscheidet sich von der Schallgeschwindigkeit, mit der sich die Druck- und Dichtestörungen durch das Medium ausbreiten.\"\n\n> **Quelle:** Skript Kap. 1.2, S. 4",
q04:"Das menschliche Hörorgan gliedert sich in drei Hauptbestandteile: das **Außenohr**, das **Mittelohr** und das **Innenohr**. Das Außenohr besteht aus Ohrmuschel und Gehörgang; die Ohrmuschel empfängt die Schallwellen und leitet sie über den Gehörgang zum Trommelfell. Im Mittelohr überträgt die Gehörknöchelchenkette aus **Hammer, Amboss und Steigbügel** die Schwingungen des Trommelfells mit einer Hebelwirkung auf das ovale Fenster. Das Innenohr enthält die Gehörschnecke (Cochlea), in der die flüssigkeitsgefüllten Hohlräume und die **Basilarmembran** eine frequenzabhängige Schwingung erzeugen. Auf der Basilarmembran befinden sich die **Haarzellen** im Corti-Organ, die kleinste Bewegungen in Nervenaktivität umwandeln.\n\n> \"Das Hörorgan des Menschen besteht aus dem Außen-, dem Mittel- und dem Innenohr.\"\n\n> \"Auf der Basilarmembran befinden sich im Corti-Organ spezialisierte Sinneszellen, die Haarzellen. An deren Zellkörper sitzen haarähnliche Strukturen, mit deren Hilfe kleinste Bewegungen in Nervenaktivität umgewandelt werden.\"\n\n> **Quelle:** Skript Kap. 1.3, S. 5–6",
q05:"In der Akustik werden **Pegelgrößen** verwendet, weil die Beziehung zwischen dem physikalischen Reiz (Schalldruckeffektivwert) und der menschlichen Empfindung (Lautstärke) stark **nichtlinear** ist und in erster Näherung einem logarithmischen Zusammenhang folgt, dem sogenannten **Weber-Fechnerschen Gesetz**. Zudem erstreckt sich der relevante Schalldruckbereich über viele Größenordnungen — von der Hörschwelle bei etwa $p₀ = 2·10⁻⁵$ Pa bis zur Schmerzgrenze bei ca. 50 Pa. Die logarithmische Darstellung komprimiert diesen enormen Bereich auf eine handliche Skala in Dezibel. Dabei entspricht 1 dB in etwa dem kleinsten wahrnehmbaren Unterschied. Als konkretes Beispiel dient der **Schalldruckpegel** $Lₚ = 10·lg(p̃²/p₀²)$ dB.\n\n> \"Der Beziehung zwischen dem Schalldruckeffektivwert (Reiz) und der empfundenen Lautstärke (Empfindung) ist stark nichtlinear. Ähnlich wie bei anderen, beispielsweise optischen Reizen kann in erster Näherung ein logarithmischer Zusammenhang zu seiner Beschreibung verwendet werden (Weber-Fechnersches Gesetz der Psychophysik).\"\n\n> **Quelle:** Skript Kap. 1.3, S. 7",
q06:"Die menschliche **Lautstärkeempfindung** hängt bei sonst gleichartigen Schallereignissen primär vom **Effektivwert des Schalldrucks** $p̃$ ab. Das Effektivwertquadrat $p̃²$ ist proportional zur im Ohr umgesetzten mechanischen Leistung, weshalb die Lautstärke stets positiv ist. Darüber hinaus spielt die **Frequenz** eine entscheidende Rolle: Das menschliche Ohr ist im Bereich von etwa 1–4 kHz am empfindlichsten, während bei tiefen und sehr hohen Frequenzen ein deutlich höherer Schalldruck nötig ist, um denselben Lautstärkeeindruck zu erzeugen. Dieser Zusammenhang wird durch die **Isophonen** (Kurven gleicher Lautstärke) dargestellt.\n\n> \"Für sonst gleichartige Schallereignisse hängt die empfundene Lautstärke vom Effektivwert des Schalldrucks $p̃$ ab.\"\n\n> \"Die Kurven gleicher Lautstärke (Isophonen) geben an, welcher Schalldruck für einen Ton einer bestimmten Frequenz jeweils nötig ist, um genauso laut wahrgenommen zu werden wie ein Ton bei einer Frequenz von 1 kHz.\"\n\n> **Quelle:** Skript Kap. 1.3, S. 7–9",
q07:"Die **A-Bewertung** wird verwendet, um aus einem gemessenen Schallspektrum einen einzelnen Zahlenwert zu gewinnen, der dem subjektiven **Lautstärkeeindruck** des Menschen näherungsweise entspricht. Da das Ohr bei verschiedenen Frequenzen unterschiedlich empfindlich ist — bei tiefen Frequenzen deutlich weniger als im mittleren Bereich — werden die Schalldruckpegel der einzelnen Terzbänder mit frequenzabhängigen Korrekturwerten $K_A$ versehen. Diese Korrekturwerte sind so gewählt, dass sie in etwa die Isophone bei 40 phon ausgleichen. So wird beispielsweise ein 60-dB-Ton bei 50 Hz stark gedämpft (ca. −30 dB), während 1 kHz unverändert bleibt ($K_A = 0$ dB). Allerdings ist die A-Bewertung nur eine Näherung.\n\n> \"Diese sind so gewählt, dass sie in etwa die Isophone bei 40 phon ausgleichen. Damit wird deutlich, dass die A-Bewertung nur begrenzt geeignet ist, die Lautstärkeempfindung tatsächlich wiederzugeben.\"\n\n> \"Andere Methoden zur Berechnung der Größe 'Lautstärke' sind allerdings deutlich aufwändiger. Deshalb wird der A-bewertete Schalldruckpegel heute fast ausschließlich verwendet.\"\n\n> **Quelle:** Skript Kap. 1.3, S. 9–10",
q08:"Eine **Welle** ist eine räumlich und zeitlich veränderliche Störung physikalischer Größen, bei der **Energie**, aber keine Materie transportiert wird. Im Kontext der Akustik handelt es sich um kleine Schwankungen von Druck, Dichte oder Auslenkung, die sich mit der **Schallgeschwindigkeit** $c$ im Medium ausbreiten. Entscheidend ist, dass zeitliche und örtliche Änderungen über $c$ miteinander verknüpft sind: Der Schalldruck an einem Ort $x₁$ zum Zeitpunkt $t₁$ hängt vom Zustand an einem früheren Ort ab. Alle Orte gleicher Laufzeit bilden eine **Wellenfront** (Phasenfläche). Durch das **Superpositionsprinzip** können beliebige Schallfelder als Summe einfacher Wellen dargestellt werden.\n\n> \"Dabei wird keine Materie transportiert, sondern Energie. [...] kleine zeitlich veränderliche Störungen des Drucks, der Dichte oder der Auslenkung bilden den Ausgangspunkt für eine Welle.\"\n\n> \"Eine Welle führt also zur zeitlichen und örtlichen Änderung physikalischer Größen.\"\n\n> **Quelle:** Skript Kap. 2.1, S. 11",
q09:"Der wesentliche Unterschied zwischen **ebener Welle** und **Kugelwelle** liegt in der Form ihrer **Phasenflächen** und dem Amplitudenverhalten. Bei einer ebenen Welle sind die Phasenflächen parallele Ebenen; die Amplitude bleibt unabhängig vom Abstand konstant, und die Lösung lautet $p = F(t − x/c)$. Die **Impedanz** ist rein reell: $p/v = ρ₀c$. Bei einer Kugelwelle hingegen sind die Phasenflächen konzentrische Kugeloberflächen, die von einer **punktförmigen Störung** ausgehen. Die Amplitude nimmt mit $1/r$ ab, was einem Pegelabfall von $−6$ dB pro Abstandsverdopplung entspricht. Im **Nahfeld** ist die Impedanz komplex; erst im Fernfeld ($kr ≫ 1$) nähert sie sich dem reellen Wert $ρ₀c$ an.\n\n> \"Ist die ursächliche Störung punktförmig, erfolgt eine gleichmäßige Ausbreitung in alle Richtungen und die Phasenflächen haben die Form einer Kugeloberfläche. Es ist dann von einer Kugelwelle die Rede.\"\n\n> **Quelle:** Skript Kap. 2.1, S. 11–12",
q10:"Die **Wellenzahl** $k$ ist die räumliche Entsprechung der Kreisfrequenz $ω$ und beschreibt, wie stark sich die Phase einer Welle pro Längeneinheit ändert. Sie ist definiert als $k = 2π/λ = ω/c$ mit der Einheit $1/m$. Dabei ist $λ$ die **Wellenlänge**, also der Abstand zwischen zwei Phasenflächen gleichen Schwingungszustands. Die Wellenzahl tritt als Betrag des **Wellenzahlvektors** $k$ auf, dessen Richtung die Ausbreitungsrichtung der Welle angibt. In der Akustik ist die Wellenzahl besonders wichtig für die **Helmholtz-Zahl** $ka$, die das Verhältnis einer charakteristischen Abmessung $a$ zur Wellenlänge beschreibt.\n\n> \"Sein Betrag, die Wellenzahl $k = 2π/λ$, hängt von der Wellenlänge $λ$ ab, dem Abstand zwischen zwei Phasenflächen gleichen Schwingungszustandes.\"\n\n> **Quelle:** Skript Kap. 2.1, S. 12",
q11:"Die drei **Grundgleichungen des Schallfeldes** in Fluiden ergeben sich aus fundamentalen Erhaltungssätzen und beschreiben zusammen fünf unbekannte Feldgrößen ($p$, $ρ$, $v$). Die **Kontinuitätsgleichung** (Massenerhaltung) besagt, dass eine zeitliche Dichteänderung $∂ρ/∂t$ nur durch einen Netto-Massenfluss $ρ₀∇·v$ aus dem betrachteten Volumen entstehen kann. Die **Bewegungsgleichung** (Euler-Gleichung, Impulserhaltung) verknüpft die Beschleunigung eines Fluidteilchens mit dem Druckgradienten: $ρ₀·∂v/∂t + ∇p = 0$. Die **Zustandsgleichung** stellt unter der Annahme einer isentropen Zustandsänderung einen linearen Zusammenhang zwischen Schalldruck und Schalldichte her: $p = c²·ρ$. Durch Kombination dieser drei Gleichungen lässt sich die **Wellengleichung** herleiten.\n\n> \"Ein vollständiges mathematisches Modell benötigt demzufolge fünf unabhängige Gleichungen zur Beschreibung. Diese fünf Gleichungen lassen sich mithilfe von Erhaltungssätzen gewinnen.\"\n\n> \"Diese Zustandsgleichung liefert einen linearen Zusammenhang zwischen Druck- und Dichteänderung. Der Proportionalitätsfaktor ist das Quadrat der Schallgeschwindigkeit $c$.\"\n\n> **Quelle:** Skript Kap. 3.1–3.3, S. 17–22",
q12:"Die **Schallgeschwindigkeit** in einem idealen Gas hängt ausschließlich von der **Temperatur** ab, nicht vom Gleichdruck oder anderen Zustandsgrößen. Der Zusammenhang ergibt sich aus der isentropen Zustandsgleichung und der thermischen Zustandsgleichung idealer Gase $p = ρRT$. Man erhält $c² = κRT$, wobei $κ$ der **Isentropenexponent** (für Luft $κ = 1,4$) und $R$ die **spezifische Gaskonstante** (für Luft $R = 287$ J/(kg·K)) ist. Bei Raumtemperatur ($T ≈ 293$ K) ergibt sich $c ≈ 343$ m/s. Da $c$ proportional zu $√T$ ist, steigt die Schallgeschwindigkeit mit zunehmender Temperatur.\n\n> \"Hier wird sichtbar, dass für ein bestimmtes ideales Gas die Schallgeschwindigkeit lediglich von der Temperatur, nicht aber vom Gleichdruck oder anderen Zustandsgrößen, abhängt.\"\n\n> **Quelle:** Skript Kap. 3.3, S. 22",
q13:"Die **homogene lineare akustische Wellengleichung** $Δp − (1/c²)·∂²p/∂t² = 0$ beschreibt den Zusammenhang zwischen der **örtlichen und zeitlichen Verteilung** des Schalldrucks bei der Ausbreitung in einem Fluid. Sie ist homogen, weil keine Quellterme auf der rechten Seite stehen — es wird also nur die **Schallausbreitung**, nicht die Schallentstehung beschrieben. Bei der Herleitung werden mindestens sechs wichtige **Annahmen** gemacht: (1) Keine Quellen im betrachteten Gebiet, (2) nichtviskoses Fluid, (3) isentrope Zustandsänderung, (4) kleine Schwankungsgrößen, (5) Vernachlässigung der konvektiven Beschleunigung, und (6) ruhendes Fluid.\n\n> \"Die Wellengleichung in der angegebenen Form ist eine homogene Differentialgleichung, die den Zusammenhang der örtlichen und zeitlichen Verteilung des Schalldrucks bei der Schallausbreitung beschreibt.\"\n\n> \"Damit werden durch die Wellengleichung ebenfalls keine Quellen erfasst. Das bedeutet, dass nur die Schallausbreitung und nicht die Schallentstehung beschrieben wird.\"\n\n> **Quelle:** Skript Kap. 3.4, S. 22–24",
q14:"Die wichtigsten **Lösungen der Wellengleichung** unterscheiden sich in der Form ihrer Phasenflächen und im Amplitudenverhalten. Die **ebene Welle** ist die einfachste Lösung: $p = f₊(t − x/c) + f₋(t + x/c)$, also eine Überlagerung zweier entgegengesetzt laufender Wellen. Die Amplitude bleibt entfernungsunabhängig konstant. Die **Kugelwelle** entsteht bei punktförmiger Anregung; ihre Amplitude nimmt mit $1/r$ ab, was einem Pegelabfall von **−6 dB pro Abstandsverdopplung** entspricht. Die **Zylinderwelle** entsteht bei linienförmiger Anregung mit einer Amplitudenabnahme proportional zu $1/√r$, also **−3 dB pro Abstandsverdopplung**.\n\n> \"Die vollständige Lösung ist also: $p = f₊(t − x/c) + f₋(t + x/c)$.\"\n\n> \"Alle Lösungen der Wellengleichung beschreiben somit Schallwellen, die sich in einem Gebiet ausbreiten, für das die Wellengleichung gilt.\"\n\n> **Quelle:** Skript Kap. 3.4, S. 23 u. Kap. 4.1, S. 25–26",
q15:"Die **Schallintensität** $I$ ist eine zentrale Energiegröße der Akustik, die den Energietransport durch Schallwellen quantifiziert. Sie wird aus der akustischen Energieerhaltungsgleichung abgeleitet und ist definiert als das Produkt $I = p·v$ aus momentanem Schalldruck und momentaner Schallschnelle — physikalisch der **Energiefluss pro Zeiteinheit und Fläche** über die Grenzen eines Kontrollvolumens. In der Praxis wird stets der **zeitliche Mittelwert** betrachtet. Für eine ebene Welle, in der $v = p/Z₀$ gilt, vereinfacht sich der Betrag der zeitgemittelten Intensität zu $I = p̃²/(ρ₀c)$, wobei $p̃$ der **Schalldruckeffektivwert** und $Z₀ = ρ₀c$ die Schallkennimpedanz ist.\n\n> \"I lässt sich demzufolge als Energiefluss pro Zeiteinheit und Fläche über die Grenzen eines Kontrollvolumens auffassen und bekommt die Bezeichnung Schallintensität.\"\n\n> **Quelle:** Skript Kap. 5.2, S. 34–36",
q16:"Der Zusammenhang zwischen **Schallleistungspegel** $L_W$ und **Schalldruckpegel** $Lₚ$ im freien Schallfeld beruht auf der Überlegung, dass die Schallleistung einer Quelle durch Integration der Schallintensität über eine geschlossene **Hüllfläche** im Fernfeld bestimmt werden kann. Im Fernfeld gilt $I = p̃²/Z₀$, sodass die Schallleistung als $P = p̃²·S/Z₀$ geschrieben werden kann. Durch Einsetzen in die Pegeldefinition und die Vereinfachung für Luft bei Normalbedingungen ($Z₀ ≈ 400$ Ns/m³) ergibt sich $L_W ≈ L_{pm} + 10·lg(S/S₀)$ dB, wobei $S₀ = 1$ m².\n\n> \"Diese Beziehung verknüpft die Schallleistung und den Schalldruck in einem freien Schallfeld und kann zur Bestimmung der Schallleistung aus gemessenen Schalldruckeffektivwerten verwendet werden.\"\n\n> **Quelle:** Skript Kap. 5.2, S. 36–37",
z01:"Bei der Schallausbreitung gilt das Prinzip der **Energieerhaltung**: Die in einer einfallenden Welle transportierte Leistung $P_e$ teilt sich beim Auftreffen auf eine Grenzfläche auf in die Leistung der **reflektierten** Welle $P_r$, der **transmittierten** Welle $P_t$ und die durch **Dissipation** verlorengehende Leistung $P_d$. Es gilt $P_e = P_r + P_t + P_d$. Durch Division durch $P_e$ erhält man die **Energiegrade**: $ρ = P_r/P_e$ (Reflexionsgrad, mit $ρ = |r|²$), $τ = P_t/P_e$ (Transmissionsgrad) und $δ = P_d/P_e$ (Dissipationsgrad), sodass $1 = ρ + τ + δ$. Der **Absorptionsgrad** $α = 1 − ρ = τ + δ$ gibt an, welcher Anteil dem Schallfeld auf der Einfallsseite verloren geht.\n\n> \"Im Gegensatz zu Verhältnissen von Feldgrößen bzw. Amplituden, den Faktoren (z.B. Reflexionsfaktor), werden diese Leistungsverhältnisse als Grade bezeichnet.\"\n\n> \"Der Absorptionsgrad beschreibt, wie viel Leistung dem Schallfeld auf der Seite der einfallenden Welle verloren geht und von der Wand und dem dahinter liegenden Schallfeld aufgenommen (absorbiert) wird.\"\n\n> **Quelle:** Skript Kap. 5.3, S. 37–38",
z02:"Die **Schallleistung** einer Quelle kann experimentell bestimmt werden, indem man den **Schalldruckeffektivwert** $p̃$ auf einer geschlossenen Hüllfläche $S$ misst, die die Quelle vollständig umschließt. Grundlage ist $P = ∮ I·dS$. Im **Fernfeld** gilt $I = p̃²/Z₀$, sodass $P = p̃²·S/Z₀$. In der Praxis wird der Schallleistungspegel über $L_W ≈ L_{pm} + 10·lg(S/S₀)$ dB berechnet, wobei $L_{pm}$ der über die Messfläche gemittelte Schalldruckpegel und $S₀ = 1$ m² ist.\n\n> \"Diese Beziehung verknüpft die Schallleistung und den Schalldruck in einem freien Schallfeld und kann zur Bestimmung der Schallleistung aus gemessenen Schalldruckeffektivwerten verwendet werden.\"\n\n> \"Soll die Schallleistung von Maschinen und Geräten nach internationalen Normen angegeben werden, bildet sie in den meisten Fällen die wissenschaftliche Grundlage für entsprechende Messungen.\"\n\n> **Quelle:** Skript Kap. 5.2, S. 36–37",
q17:"Die Reflexion an einer Wand kann durch drei zentrale Größen beschrieben werden: den **Reflexionsfaktor** $r$, die **Wandimpedanz** $Z_W$ und den **Absorptionsgrad** $α$. Der Reflexionsfaktor ist das Verhältnis der komplexen Amplituden von reflektierter und einfallender Welle, und es gilt $r = (Z_W − Z₀)/(Z_W + Z₀)$. Für eine **schallharte Wand** verschwindet die Schnelle an der Wand ($v_n = 0$), was $Z_W → ∞$ und $r = 1$ ergibt — der Schall wird vollständig reflektiert. Für eine **schallweiche Wand** verschwindet der Schalldruck ($p = 0$), also $Z_W = 0$ und $r = −1$.\n\n> \"Im schallharten Fall ist nämlich $Z_W = ∞$ und im schallweichen $Z_W = 0$.\"\n\n> \"Die schallharte Randbedingung wird für $r = 1$ erfüllt [...] die schallweiche Randbedingung $p = 0$ vorausgesetzt wird. Dann gilt $r = −1$.\"\n\n> **Quelle:** Skript Kap. 4.2–4.3, S. 27–29",
q18:"Der **Transmissionsfaktor** $t = p̃_t/p̃_e$ beschreibt das Verhältnis der Schalldruckamplitude der transmittierten zur einfallenden Welle. An der Grenzfläche zweier Fluide ergibt sich $t = 1 + r = 2Z_{0,2}/(Z_{0,2} + Z_{0,1})$. Da $r$ zwischen $−1$ und $+1$ liegt, kann $|t|$ zwischen $0$ und $2$ liegen. Ein Wert größer als eins bedeutet, dass die **Schalldruckamplitude** der transmittierten Welle größer ist als die der einfallenden — dies widerspricht nicht der Energieerhaltung. Die transportierte **Schallleistung** hängt nämlich nicht allein vom Schalldruck, sondern auch von der Schallkennimpedanz $Z₀ = ρ₀c$ des jeweiligen Mediums ab.\n\n> \"Obwohl der Betrag des Reflexionsfaktors nie größer als eins ist, kann der Betrag des Transmissionsfaktors Werte zwischen 0 und 2 annehmen.\"\n\n> \"Die transportierte Energie hängt nämlich nicht nur von der Amplitude des Schalldrucks, sondern auch vom Medium ab.\"\n\n> **Quelle:** Skript Kap. 4.4, S. 30–31",
q19:"Bei **schrägem Schalleinfall** auf die Grenze zwischen zwei Fluiden mit unterschiedlicher Schallgeschwindigkeit kommt es zur **Brechung**. Die Richtungsänderung folgt dem **Snellius'schen Brechungsgesetz**: $sinθ₁/sinθ₂ = c₁/c₂$. Ist $c₂ > c₁$, wird die Welle vom Lot weg gebrochen; ist $c₂ < c₁$, zum Lot hin. Der **Reflexionsfaktor** ändert sich bei schrägem Einfall: $r(θ) = (Z_W·cosθ − Z₀)/(Z_W·cosθ + Z₀)$. Bei $c₁ < c₂$ existiert ein **Grenzwinkel** $θ_c = arcsin(c₁/c₂)$, oberhalb dessen **Totalreflexion** auftritt.\n\n> \"Aus der Überlegung, dass sich die Komponenten des Wellenzahlvektors in Richtung der Grenzebene auf beiden Seiten gleichen müssen, ergibt sich genau wie in der Optik ein Brechungsgesetz (Snellius).\"\n\n> **Quelle:** Skript Kap. 6.1, S. 39–40",
q20:"Die Schallbrechung in der Atmosphäre entsteht dadurch, dass die **Schallgeschwindigkeit** von der **Temperatur** abhängt und sich die Temperatur mit der Höhe ändert. Im **Normalfall** ist die Temperatur am Boden höher, sodass die Schallgeschwindigkeit dort größer ist. Schallwellen werden dann nach oben gebrochen und es entsteht eine **Schattenzone**. Bei einer **Inversion** kehrt sich die Temperaturschichtung um — die Luft am Boden ist kälter. Dann werden die Schallwellen zum Boden hin gebrochen und der Schall kann sich über große Entfernungen ausbreiten.\n\n> \"Im Normalfall herrscht unmittelbar über dem Boden eine höhere Temperatur als in höheren Luftschichten. Sich ausbreitende Schallwellen ändern dann ihre Richtung und werden nach oben gebrochen.\"\n\n> \"Gelegentlich treten Wetterlagen auf, bei denen die normale Temperaturschichtung umgekehrt wird (Inversion). Dann ist die Luft über dem Boden kälter als in größerer Höhe.\"\n\n> **Quelle:** Skript Kap. 6.1, S. 40–41",
q21:"Beim Auftreffen einer Schallwelle auf eine **Trennwand** teilt sich die einfallende Schallleistung $P_e$ gemäß der Energieerhaltung in drei Anteile auf: $P_r$ (reflektiert), $P_t$ (transmittiert), $P_d$ (dissipiert). Es gilt $P_e = P_r + P_t + P_d$, und daraus folgen die **Energiegrade**: $ρ + τ + δ = 1$. Der **Absorptionsgrad** $α = 1 − ρ = τ + δ$ beschreibt, welcher Anteil der Leistung dem Schallfeld auf der Einfallsseite insgesamt verloren geht.\n\n> \"Aus dem Prinzip der Energieerhaltung folgt unmittelbar, dass sich die in der einfallenden Welle transportierte Leistung auf jene in der reflektierten und in der transmittierten Welle und die durch Dissipation verlorengehende Leistung aufteilt.\"\n\n> \"Der Absorptionsgrad beschreibt, wie viel Leistung dem Schallfeld auf der Seite der einfallenden Welle verloren geht.\"\n\n> **Quelle:** Skript Kap. 5.3, S. 37–38",
q22:"Unter einem **diffusen Schalleinfall** versteht man die Situation, dass Schallwellen gleichzeitig aus **allen Richtungen** mit der **gleichen Intensität** auf eine Oberfläche einfallen. Da der Reflexionsfaktor vom Einfallswinkel abhängt, muss bei diffusem Schalleinfall eine **Mittelwertbildung** über alle Einfallsrichtungen erfolgen. Der resultierende **Absorptionsgrad für diffusen Schalleinfall** ergibt sich als $α_d = ∫₀^{π/2} 2α(θ)·cosθ·sinθ dθ$.\n\n> \"Eine einfache Modellvorstellung dafür ist, dass der Schalleinfall aus allen Richtungen mit der gleichen Intensität erfolgt. Ein solcher Schalleinfall ist dann 'diffus'.\"\n\n> \"Für die Betrachtung der Reflexion bzw. der Absorption muss dann eine Mittelwertbildung über die verschiedenen Einfallsrichtungen erfolgen.\"\n\n> **Quelle:** Skript Kap. 6.2, S. 41–42",
q23:"Das Verhalten von Schallwellen beim Auftreffen auf ein Hindernis hängt entscheidend vom Verhältnis der **Hindernisabmessungen** zur **Wellenlänge** ab (Helmholtz-Zahl $kl_z$). Ist das Hindernis **sehr klein** ($kl_z ≪ 1$), kommt es nur zu geringer **Streuung** — die Schallwelle läuft nahezu ungestört weiter. Ist es hingegen **nicht klein** ($kl_z ≫ 1$), nimmt die Intensität im gestreuten Schallfeld stark zu und es kommt zu deutlicher Reflexion und Schattenbildung.\n\n> \"Bei kleinem $kl_z$, also im Verhältnis zur Abmessung der reflektierenden Fläche großen Wellenlängen nur eine Streuung mit geringer Intensität erfolgt.\"\n\n> \"Wir können daraus ganz allgemein schließen, dass es bei ausreichend kleinen Hindernissen unabhängig von ihrer Form nicht zu nennenswerten Reflexionen kommt.\"\n\n> **Quelle:** Skript Kap. 6.3, S. 43–44",
q24:"Poröse Schallabsorber bestehen aus einem **festen Skelett** mit offenen **Poren**, in denen sich Luft befindet. Durch die große innere Oberfläche der Porenwände entstehen Verluste, die den Schall absorbieren. Das Skript nennt vier wesentliche Materialbeispiele: **Mineral- und Glaswolle** (Flugzeugkabinenwände, Leichtbauwände, Akustik-Decken), **offenporige Schaumstoffe** (Kfz-Bereich, Innenräume), **Metallschäume** (Maschinen) sowie **Granulate** wie Sand, Split und spezielle Asphalte für den Einsatz im Freien.\n\n> \"Mineral- und Glaswolle (Einsatz in der Kabinenwand von Flugzeugen, in Leichtbauwänden oder Akustik-Decken in Gebäuden), offenporige Schaumstoffe (Einsatz unter anderem im Kfz-Bereich und in Innenräumen), Metallschäume (für spezielle Einsatzgebiete in Maschinen), Granulate (z.B. Sand, Split, spezielle Betone und Asphalte für den Einsatz im Freien).\"\n\n> **Quelle:** Skript Kap. 7, S. 46",
q25:"In porösen Schallabsorbern treten zwei wesentliche **physikalische Verlustmechanismen** auf. Der erste sind **viskose Verluste**: In den Poren bildet sich eine viskose Grenzschicht, in der die Reibung zwischen den Fluidschichten zu Energieverlusten führt. Der zweite sind **thermische Verluste**: Das Skelettmaterial hat eine bessere Wärmeleitfähigkeit als das Fluid, und in einer thermischen Grenzschicht erfolgt die Zustandsänderung weder isentrop noch isotherm — also nicht reversibel. Beide Effekte werden durch die sehr große **innere Oberfläche** in porösen Materialien relevant.\n\n> \"Streift eine Schallwelle also die Oberfläche, kommt es zu unterschiedlichen Schallschnellen in verschiedenen Schichten des Fluids in Nähe zur Oberfläche und die viskose Reibung zwischen diesen Schichten führt zu Energieverlusten.\"\n\n> \"In einer thermischen Grenzschicht bildet sich ein Gebiet aus, in dem die Zustandsänderung weder isentrop noch isotherm und damit auch nicht reversibel erfolgt und es kommt zu thermischen Verlusten.\"\n\n> **Quelle:** Skript Kap. 7.1, S. 46–47",
q26:"Die Verluste bei der Schallausbreitung in porösen Absorbern lassen sich mathematisch durch **komplexwertige Materialgrößen** beschreiben. Die viskosen Verluste werden durch eine **komplexe Dichte** $ρ_a$ erfasst, die thermischen durch einen **komplexen Kompressionsmodul** $K_a$. Daraus ergibt sich eine **komplexe Wellenzahl** $k_a$: Der Realteil bestimmt die Ausbreitungsgeschwindigkeit, der Imaginärteil die **Dämpfung** — der Faktor $e^{Im(k_a)·x}$ beschreibt die exponentielle Amplitudenabnahme.\n\n> \"Der Faktor $e^{Im(k_a)x}$, eine Exponentialfunktion, zeigt, dass bei negativem $Im(k_a)$ in dieser ebenen Welle die Amplitude mit steigender Entfernung abnimmt.\"\n\n> \"Zusammengefasst bestimmt der Realteil der Wellenzahl die Schallgeschwindigkeit und der Imaginärteil bestimmt die Dämpfung bei der Ausbreitung der Welle.\"\n\n> **Quelle:** Skript Kap. 7.1, S. 47–48",
q27:"Zur Charakterisierung der porösen Eigenschaften eines Materials werden drei wesentliche Parameter verwendet. Die **Porosität** $σ = V_P/V_G$ beschreibt das Verhältnis des Porenvolumens zum Gesamtvolumen. Der **längenbezogene Strömungswiderstand** $Ξ$ ist definiert als der Druckabfall pro Längeneinheit bei gleichförmiger Durchströmung. Die **Tortuosität** $q² = (l₁/d)²$ erfasst die Gewundenheit der Poren — das Verhältnisquadrat der tatsächlichen Weglänge zum kürzesten Abstand.\n\n> \"Die wichtigste geometrische Eigenschaft ist das Verhältnis des Porenvolumens $V_P$ zum Gesamtvolumen $V_G$, die Porosität.\"\n\n> \"Prinzipiell wird durch den Parameter Tortuosität die Tatsache erfasst, dass die Poren Strömungswege für das Fluid bilden, die nicht gerade, sondern gewunden sind und veränderlichen Querschnitt haben.\"\n\n> **Quelle:** Skript Kap. 7.2, S. 48–50",
q28:"Aus den **Materialparametern** lassen sich die **Absorberkennwerte** — $k_a$ und $Z_a$ — auf verschiedene Arten ermitteln. Das **empirische Modell von Miki** basiert auf Messwerten an Fasermaterialien; bei $σ ≈ 1$ und $q² ≈ 1$ hängen die Kennwerte nur vom Strömungswiderstand ab und werden als Funktion der **Absorberzahl** $X = ρ₀f/Ξ$ dargestellt. Das **phänomenologische Modell von Hamet** ergänzt die Grundgleichungen um viskose und thermische Verlustfunktionen und berücksichtigt alle drei Parameter ($σ$, $Ξ$, $q²$).\n\n> \"Das empirische Modell von Miki ist eine Weiterentwicklung des Modells von Delany und Bazley und beruht auf einer großen Zahl von Messwerten, die an Proben von Fasermaterialien gewonnen wurden.\"\n\n> \"Das phänomenologische Modell von Hamet geht von geeigneten Ergänzungen der Grundgleichungen aus.\"\n\n> **Quelle:** Skript Kap. 7.3, S. 50–51",
q29:"Der **Absorptionsgrad** einer Schicht porösen Absorbers zeigt einen charakteristischen Zusammenhang mit Schichtdicke, Frequenz und Materialeigenschaften. Mit zunehmender **Frequenz** steigt er zunächst an, bis er oberhalb einer **Knickfrequenz** ein hohes Niveau erreicht. Größere **Schichtdicke** $d$ verschiebt diese Knickfrequenz zu tieferen Frequenzen. Der dimensionslose Strömungswiderstand $ε = Ξ·d/Z₀$ bestimmt das Maximum: Für $ε ≈ 2$ ergibt sich der **optimale** Absorptionsgrad.\n\n> \"Unterhalb einer 'Knickfrequenz' steigt der Absorptionsgrad mit der Frequenz an, während er oberhalb dieser Frequenz annähernd konstant bleibt.\"\n\n> \"Für $ε ≈ 2$ ergibt sich ein sehr hoher Absorptionsgrad, während für kleinere und größere Werte der Absorptionsgrad geringer ist.\"\n\n> **Quelle:** Skript Kap. 7.4, S. 52–53",
q30:"Die Berechnung der **Eigenfrequenzen** und **Eigenformen** im Quaderraum gelingt durch einen **Produktansatz** $p(x) = p̂·f_x(x)·f_y(y)·f_z(z)$, der die dreidimensionale Wellengleichung in drei unabhängige eindimensionale Gleichungen zerlegt. Dieses Separationsverfahren funktioniert nur, weil die Geometrie des Quaderraums besonders einfach ist und die Randbedingungen entlang jeder Koordinatenrichtung unabhängig erfüllt werden können. Bei beliebig geformten Räumen existieren solche einfachen Ansatzfunktionen nicht — es bleibt nur die **numerische Behandlung** (FEM, BEM).\n\n> \"Während sich einige wenige einfache Raumgeometrien (Zylinder, Kugel) in ähnlicher Weise behandeln lassen, sind die meisten praktisch relevanten Räume unregelmäßig geformt und es gibt keine einfachen Ansatzfunktionen, mit deren Hilfe die Randbedingungen erfüllt werden können.\"\n\n> **Quelle:** Skript Kap. 8.1, S. 57",
q31:"Die **statistische Beschreibung** von Schallfeldern wird sinnvoll, wenn die Zahl der **Moden** so groß wird, dass eine wellentheoretische Analyse nicht mehr praktikabel ist. Die Modenzahl wächst mit $N(f) ≈ 4πf³V/(3c³)$, also mit der **dritten Potenz der Frequenz**. Die Berechnung einer solch enormen Modenzahl ist selbst mit leistungsstarken Computern sehr aufwändig. Daher ist es zweckmäßiger, **Mittelwerte** zu betrachten, wie es das **Modell des diffusen Schallfeldes** ermöglicht.\n\n> \"Das bedeutet beispielsweise, dass es in einem Raum von 100 m³, der etwa 10.000 Eigenfrequenzen unter 1000 Hz hat, im Frequenzbereich bis 10 kHz bereits etwa 10 Millionen Eigenfrequenzen (!) gibt.\"\n\n> **Quelle:** Skript Kap. 8.2, S. 58–59",
q32:"Das **Modell des diffusen Schallfeldes** basiert auf mehreren grundlegenden **Annahmen**. Erstens wird die **Schallenergiedichte** $w$ als räumlich konstant angenommen. Zweitens wird das Schallfeld als Überlagerung vieler **ebener Wellen** modelliert, die aus **allen Raumrichtungen mit gleicher Wahrscheinlichkeit** einfallen, sodass der gemittelte Intensitätsvektor verschwindet. Diese Annahmen sind dann erfüllt, wenn der Raum eine **hohe Modenzahl** aufweist und über ausreichend große Gebiete und Frequenzbänder gemittelt wird. In der Nähe von Quellen gilt das Modell nicht (Freifeld); die Grenze wird durch den **Hallradius** $r_H ≈ √(A/50)$ beschrieben.\n\n> \"Eine weitere wichtige Grundlage des Modells ist, dass der Schall aus allen Richtungen mit gleicher Wahrscheinlichkeit bzw. Intensität einfällt.\"\n\n> **Quelle:** Skript Kap. 9.1, S. 60–62",
q33:"Die **äquivalente Absorptionsfläche** $A$ fasst die Absorption aller Wandflächen eines Raumes in einer Größe zusammen: $A = Σ α_{d,j}·S_j$, wobei $α_{d,j}$ der Absorptionsgrad für diffusen Schalleinfall der jeweiligen Teilfläche ist. Die **Nachhallzeit** $T$ gibt an, welche Zeit vergeht, bis der Schalldruckpegel nach Abschalten einer Quelle um **60 dB** abfällt. Der Zusammenhang wird durch die **Sabine-Formel** beschrieben: $T = 0,161·V/A$. Je größer $A$, desto kürzer die Nachhallzeit.\n\n> \"Sie bildet die an den Wänden des Raumes verteilte Absorption auf eine vollständig absorbierende Fläche ab.\"\n\n> **Quelle:** Skript Kap. 9.1–9.3, S. 62–65",
q34:"Nach dem Abschalten einer Schallquelle fällt die **Schallenergiedichte** im diffusen Feld **exponentiell** ab: $w(t) = w₀·e^{−Ac/(4V)·t}$. Da der Schalldruckpegel proportional zum Logarithmus des Schalldruckquadrats ist, ergibt sich aus dem exponentiellen Abfall ein **linearer Pegelabfall** mit der Zeit. Die Geschwindigkeit dieses Abfalls hängt vom Verhältnis $A/V$ ab. Die **Nachhallzeit** $T$ ist die Zeitspanne für genau **60 dB** Pegelabfall.\n\n> \"Der zugehörige Schalldruckpegel im Raum fällt demnach linear mit der Zeit ab.\"\n\n> **Quelle:** Skript Kap. 9.3, S. 63–64",
q35:"Die Entstehung von Fluidschall lässt sich auf drei grundlegende Mechanismen zurückführen. Der erste ist ein **zeitlich schwankender Volumenfluss** (Monopol) — Beispiele: Lautsprecher, Auspuff, menschliche Stimme. Der zweite sind **zeitlich veränderliche Kraftwirkungen** auf das Fluid (Dipol) — Beispiele: Ventilatorschaufeln, Wirbelablösung. Der dritte ist die **zeitlich schwankende Scherung** von Fluidelementen (Quadrupol) — Beispiel: turbulenter Freistrahl.\n\n> \"Für die meisten praktischen Anwendungen kann die direkte Entstehung von Fluidschall auf strömungsmechanische oder thermodynamische Prozesse zurückgeführt werden. Dabei lassen sich drei grundlegende Mechanismen unterscheiden.\"\n\n> \"Die Stärke der Schallquelle wird bei einem zeitlich veränderlichen Volumenfluss von der Plötzlichkeit der zeitlichen Änderungen bestimmt.\"\n\n> **Quelle:** Skript Kap. 10.1, S. 66–67",
q36:"Die **Lighthill-Analogie** basiert auf der Idee, dass alle bei der Herleitung der homogenen Wellengleichung gemachten Vereinfachungen möglicherweise genau jene Mechanismen beschreiben, die zur Schallentstehung führen. Man startet mit den vollständigen Grundgleichungen und formt sie so um, dass auf der linken Seite die homogene Wellengleichung steht, während alle zusätzlichen Terme als **Quellterme** auf die rechte Seite kommen. So beschreibt die linke Seite die **Ausbreitung** und die rechte die **Erzeugung**.\n\n> \"Eine plausible Überlegung dabei ist, dass alle bei der Herleitung der homogenen Wellengleichung gemachten Vereinfachungen möglicherweise eben jene Mechanismen beschreiben, die zur Schallentstehung führen.\"\n\n> \"Diese Idee ist schon deshalb vielversprechend, weil sie eine einheitliche Modellierung von Schallausbreitung und Erzeugung erlaubt.\"\n\n> **Quelle:** Skript Kap. 10.3–10.4, S. 69–72",
q37:"Die Quellterme der inhomogenen Wellengleichung beschreiben vier Mechanismen: $−∂ṁ/∂t$ (zeitliche Änderung des Massenflusses → **Monopol**), $∇·(F + v_g·ṁ)$ (örtliche Änderungen von Wechselkräften → **Dipol**), der **Lighthill-Tensor** $T_{ij}$ (Wechselspannungen durch Turbulenz → **Quadrupol**), sowie $∂²(ρ − p/c²)/∂t²$ (Abweichung von der Isentropie → z.B. Verbrennung).\n\n> \"Die linke Seite dieser Gleichung ist identisch mit der Wellengleichung. Deshalb kann sie als eine inhomogene Wellengleichung aufgefasst werden. Dabei beschreibt die linke Seite die Ausbreitung, während die Terme auf der rechten Seite für die Erzeugung von Schall stehen.\"\n\n> **Quelle:** Skript Kap. 10.4, S. 71–73",
q38:"Ein **Monopol** erzeugt eine **Kugelwelle**, also eine sich kugelsymmetrisch in alle Raumrichtungen gleichmäßig ausbreitende Schallwelle. Der Schalldruck ist $p = (jωρ₀)/(4π)·q·e^{−jkr}/r$, wobei $q$ der Schallfluss und $r$ der Abstand ist. Auch ausgedehnte Quellen, die klein gegenüber der Wellenlänge sind, strahlen Kugelwellen ab und werden als **Kugelstrahler 0. Ordnung** bezeichnet.\n\n> \"Der punktförmige Schallstrahler wird Monopol oder auch Punktstrahler genannt und zeichnet sich durch ein kugelsymmetrisches Schallfeld aus. Er ist ein gutes Modell für Schallquellen, die einen zeitlich veränderlichen Volumenfluss erzeugen.\"\n\n> **Quelle:** Skript Kap. 11.1, S. 74–76",
q39:"Die Stärke eines Monopols wird durch den **Schallfluss** $q$ bestimmt (Einheit: m³/s). Er beschreibt das pro Zeiteinheit über die Oberfläche der Quelle transportierte Fluidvolumen: $q = 4πa²v$, wobei $a$ der Radius und $v$ die Schallschnelle ist. Für die Schallentstehung maßgeblich ist die **zeitliche Änderung** $∂q/∂t$ — je plötzlicher die Änderung, desto stärker die Schallwelle.\n\n> \"Die Größe $q = 4πR²v$ ist der Schallfluss (Einheit m³/s), der das pro Zeiteinheit über die Oberfläche der Kugel transportierte Fluidvolumen beschreibt.\"\n\n> **Quelle:** Skript Kap. 11.1, S. 75",
q40:"Die **Schallstrahlungsimpedanz** des Kugelstrahlers 0. Ordnung ist $Z_r = ρ₀c·[(ka)²/(1+(ka)²) + j·ka/(1+(ka)²)]$. Der **Realteil** steigt bei tiefen Frequenzen ($ka ≪ 1$) quadratisch an — die Abstrahlung ist dann sehr ineffizient. Bei hohen Frequenzen ($ka ≫ 1$) nähert sich der Realteil dem Wert $ρ₀c$ und die Abstrahlung wird effizient. Der **Imaginärteil** beschreibt die mitschwingender Masse. Praktische Konsequenz: **Tiefton-Lautsprecher brauchen große Membranflächen**.\n\n> \"Es wird deutlich, dass der Realteil zunächst quadratisch mit der Frequenz ansteigt und dann konstant bleibt.\"\n\n> \"Bei tiefen Frequenzen ist eine solche Box ein verhältnismäßig ineffizienter Schallstrahler. Eine hohe Schallleistung kann nur erreicht werden, wenn der Schallfluss entweder durch einen größeren Hub der Lautsprechermembran und damit eine höhere Schnelle oder durch eine größere Fläche ausreichend hoch ist.\"\n\n> **Quelle:** Skript Kap. 11.2, S. 76–78",
q41:"Die **Reziprozitätsbeziehung** besagt $p(x_A)/q(x_B) = p(x_B)/q(x_A)$ — die Verhältnisse bleiben bei Vertauschung von Quellort und Aufpunkt gleich. Eine wichtige Anwendung ist die **Bestimmung des Schallflusses einer unbekannten Schallquelle**: Man platziert eine bekannte Quelle am Aufpunkt und beobachtet die Wirkung am Ort der unbekannten Quelle. Typisches Beispiel: Bestimmung des Schallflusses einer Auspuffmündung.\n\n> \"Das bedeutet, dass die von einer unbekannten Schallquelle bei $x_A$ am Aufpunkt $x_B$ verursachte Wirkung dadurch beschrieben werden kann, dass die Wirkung einer bekannten Schallquelle bei $x_B$ am Aufpunkt $x_A$ beobachtet wird.\"\n\n> **Quelle:** Skript Kap. 11.3, S. 79",
q42:"Die Schallleistung eines **strömungsmechanisch bedingten Monopols** ist proportional zu $U⁴$. Diese starke Abhängigkeit ergibt sich, weil sowohl die **Amplitude** als auch die **Frequenz** der Schwankungen proportional zu $U$ sind. Verdoppelt man die Strömungsgeschwindigkeit, steigt die Schallleistung um den Faktor $2⁴ = 16$, was **+12 dB** entspricht.\n\n> \"So steigt beispielsweise bei einer Lochsirene die Schallleistung bei Verdopplung der Drehzahl etwa um den Faktor $2⁴ = 16$.\"\n\n> **Quelle:** Skript Kap. 11.2, S. 78–79",
q43:"Das **Dipolmoment** $D$ ist das Produkt aus dem Schallfluss $q_d$ der beiden den Dipol bildenden Monopole und ihrem Abstand $d$: $D = q_d·d$. Es bestimmt die **Quellstärke eines Dipols** und tritt im Fernfeld-Schalldruckausdruck auf. Über den Zusammenhang mit der anregenden Punktkraft kann $D$ auch direkt mit der **Wechselkraft** auf das Fluid verknüpft werden.\n\n> \"Das dabei auftauchende Produkt aus Schallfluss der beiden Monopole und Abstand ist das Dipolmoment $D$, das die Quellstärke des Dipols bestimmt.\"\n\n> **Quelle:** Skript Kap. 12.1, S. 81–83",
q44:"Der Schalldruck im **Fernfeld eines Kugelstrahlers 1. Ordnung** hängt vom **Dipolmoment** $D$ (Quellstärke), der **Wellenzahl** $k$ (Frequenzabhängigkeit $∝ f⁴$ in der Leistung), dem **Abstand** $r$ ($1/r$-Abfall) und dem **Winkel** $cosϑ$ zur Dipolachse ab. Maximum bei $ϑ = 0°$ und $180°$, Nullstellen bei $ϑ = 90°$ und $270°$.\n\n> \"Im Gegensatz zum Monopol ist beim Dipol die Schallabstrahlung nicht in alle Richtungen gleich und der Schalldruck hängt vom Winkel $ϑ$, dem Winkel zur Hauptachse ab.\"\n\n> **Quelle:** Skript Kap. 12.1, S. 82–83",
q45:"Die **Richtwirkung** wird durch drei zusammenhängende Größen beschrieben. Der **Richtfaktor** $Γ(ϑ) = p̃/p̃_{max}$ gibt das Druckverhältnis in einer bestimmten Richtung zum Maximum an. Der **Bündelungsgrad** $γ$ fasst die Richtwirkung in einer Zahl zusammen: Monopol $γ = 1$, Dipol $γ = 3$, Quadrupol $γ = 5$. Das **Bündelungsmaß** $DI = 10·lg(γ)$ dB ist die logarithmische Darstellung.\n\n> \"Dieses Verhältnis ist der Richtfaktor. [...] Während der Richtfaktor als Funktion der Richtung detailliert die Richtwirkung beschreibt, kennzeichnet der Bündelungsgrad das Vermögen der Schallquelle zu gerichteter Abstrahlung in einer einzigen Zahl.\"\n\n> **Quelle:** Skript Kap. 12.1, S. 82",
q46:"Die Schallleistung strömungsmechanisch bedingter **Dipole** ist proportional zu $U⁶$, die der **Quadrupole** zu $U⁸$. Diese hohen Exponenten bedeuten, dass selbst eine **geringe Reduktion der Strömungsgeschwindigkeit** eine sehr starke Lärmminderung bewirkt — die effektivste Maßnahme an der Quelle.\n\n> \"Da sowohl das Dipolmoment als auch die Frequenz und damit die Wellenzahl proportional zur Strömungsgeschwindigkeit sind, ergibt sich eine Proportionalität zu $U⁶$.\"\n\n> \"Die Verringerung der Strömungsgeschwindigkeit ist hier demzufolge eine äußerst wirksame — und auch die einzige — Lösung zur Lärmminderung an der Schallquelle.\"\n\n> **Quelle:** Skript Kap. 12.1–12.2, S. 84–85",
q47:"Die **Richtcharakteristik** der drei Grundstrahlertypen unterscheidet sich grundlegend. Der **Monopol** strahlt kugelsymmetrisch ab ($Γ = 1$, $γ = 1$). Der **Dipol** zeigt eine achtförmige Charakteristik mit $Γ = |cosϑ|$, Maximum bei $0°/180°$, Nullstellen bei $90°/270°$, $γ = 3$. Der **longitudinale Quadrupol** hat $Γ ∝ cos²ϑ$ mit $γ = 5$, der laterale $γ = 15/4$.\n\n> \"Für den Dipol ergibt sich eine charakteristische '8'. Allerdings muss dabei beachtet werden, dass die Richtungsabhängigkeit eigentlich dreidimensional ist.\"\n\n> **Quelle:** Skript Kap. 12.1–12.2, S. 82–85",
q48:"Zwei gleichphasige, eng benachbarte Monopole ($kd ≪ 1$) erzeugen eine **Verdopplung** des Schalldrucks und eine **Vervierfachung** der Schallleistung. Bei **gegenphasigem** Betrieb bilden sie einen **Dipol**, dessen Leistung um den Faktor $k²d²/3$ reduziert ist — drastische Leistungsreduktion (**akustischer Kurzschluss**). Dies kann zur Lärmminderung genutzt werden, indem eine künstliche Gegenquelle nahe der Originalquelle platziert wird.\n\n> \"Wegen der Voraussetzung $kd ≪ 1$ ist auch dieser Faktor viel kleiner als eins und die von einem Dipol abgegeben Schallleistung deutlich kleiner als die der Monopole aus denen er zusammengesetzt ist.\"\n\n> \"Dieser Umstand lässt sich zur Lärmminderung bei tiefen Frequenzen an Schallquellen mit Monopolcharakter nutzen.\"\n\n> **Quelle:** Skript Kap. 12.1 & 13.1, S. 83 & 86–87",
q49:"In großer Entfernung von mehreren gleichphasig betriebenen Monopolen entsteht eine ausgeprägte **Richtcharakteristik**, die von der **Helmholtz-Zahl** $He = d/λ$ abhängt. Bei kleinen Helmholtz-Zahlen ($kd ≪ 1$) ist die Abstrahlung nahezu kugelförmig mit doppeltem Schalldruck. Bei größeren Helmholtz-Zahlen bildet sich eine deutliche **Hauptkeule senkrecht zur Verbindungsachse** mit Nebenkeulen.\n\n> \"Für kleine Helmholtz-Zahlen, also dicht benachbarte Monopole ergibt sich keine Richtwirkung und die Abstrahlung erfolgt gleichmäßig in alle Richtungen.\"\n\n> \"Bei größeren Helmholtz-Zahlen kommt es zu einer deutlichen Richtwirkung.\"\n\n> **Quelle:** Skript Kap. 13.1, S. 86–88",
q50:"Die **Richtcharakteristik eines Linienarrays** kann auf mehrere Weisen verändert werden: (1) Die **Helmholtz-Zahl** $He = d/λ$ beeinflusst die Bündelung — höhere Frequenzen oder größere Arrays ergeben schärfere Richtwirkung. (2) Mehr **Strahlerzahl** $N$ → schmalere Hauptkeule und schwächere Nebenkeulen. (3) **Virtuelles Schwenken** durch zeitliche Verzögerung der Signale ermöglicht Richtungsänderung ohne physisches Drehen. (4) Unterschiedliche **Amplituden** (Tapering) ermöglichen weitere Formgebung.\n\n> \"Eine Alternative zum physischen Schwenken des Arrays ist das virtuelle Schwenken. Dabei werden die einzelnen Punktstrahler mit zeitlich verschieden verzögerten Versionen desselben Signals versorgt.\"\n\n> **Quelle:** Skript Kap. 13.2, S. 89–93",
q51:"Der **Kolbenstrahler** modelliert die Schallabstrahlung eines kreisrunden Bereichs in einer reflektierenden Fläche (z.B. Lautsprecher). Die Abstrahlung erfolgt durch **Überlagerung infinitesimaler Monopole** auf der Kolbenfläche, berechnet durch das **Rayleigh-Integral**. Im Fernfeld hängt die Richtcharakteristik von der Helmholtz-Zahl $He = 2R_s/λ$ ab: Bei kleinen $He$ strahlt der Kolben monopolartig, bei großen ist die Abstrahlung **stark gebündelt**.\n\n> \"Wir können uns daher vorstellen, dass der in der Wandfläche ausgedehnte Strahler einer Überlagerung von unendlich vielen solchen Monopolen entspricht, die jeweils eine infinitesimal kleine Fläche $dS$ abbilden.\"\n\n> \"Anders als beim Linienarray erfolgt die Hauptabstrahlung nicht in eine Ebene, sondern in nur eine Richtung.\"\n\n> **Quelle:** Skript Kap. 14.1, S. 94–96",
q52:"Der Schall einer **sich bewegenden Schallflussquelle** besteht aus **drei Anteilen**. Der **erste** entspricht dem pulsierenden Volumenfluss mit **konvektiver Verstärkung** $(1−M_r)^{−2}$. Der **zweite** entsteht allein durch die Bewegung und ist nur im **Nahfeld** relevant ($∝ r^{−2}$). Der **dritte** beschreibt die Wirkung von Beschleunigung oder Richtungsänderung mit stärkerer konvektiver Verstärkung. Im **Fernfeld** bei gleichförmiger Bewegung bleibt nur der erste Term übrig.\n\n> \"Das Schallfeld einer einzelnen, sich bewegenden Punktquelle besteht demzufolge aus drei Komponenten.\"\n\n> \"Bewegt sich die Quelle zusätzlich mit keiner oder sehr geringer Beschleunigung, dann sind auch Änderungen der radialen Mach-Zahl sehr klein. Folglich bleibt von den drei Termen nur der erste übrig.\"\n\n> **Quelle:** Skript Kap. 14.2, S. 97–98",
q53:"Der **akustische Dopplereffekt** beschreibt die Frequenzverschiebung bei relativer Bewegung zwischen Quelle und Beobachter: $f_{empf} = f₀/(1 − M_r)$, wobei $M_r = U_r/c$ die **radiale Mach-Zahl** ist. Bei **Annäherung** ($M_r > 0$) wird eine höhere Frequenz wahrgenommen, bei **Entfernung** ($M_r < 0$) eine niedrigere. Der Faktor $1/(1 − M_r)$ tritt auch bei der **konvektiven Verstärkung** der Schallamplitude auf.\n\n> \"Bei diesem Phänomen handelt es sich um den bekannten Dopplereffekt. Bei Annäherung einer Schallquelle an den Beobachter kann dort eine höhere Frequenz festgestellt werden, als von der Schallquelle erzeugt wird.\"\n\n> \"Es ist außerdem interessant festzustellen, dass der auftretende Faktor $1/(1−M_r)$ derselbe ist, der bei der konvektiven Verstärkung der Amplitude der Quelle eine Rolle spielt.\"\n\n> **Quelle:** Skript Kap. 14.2, S. 98"
};
chapters.forEach(ch=>ch.cards.forEach(c=>{if(cardDetails[c.id])c.detail=cardDetails[c.id];}));

// ===== STATE =====
const STORAGE_KEY="ta-flashcards-v2";
let progress={};
let selCh="all";
let mode="menu";
let doShuffle=true;
let onlyUnknown=false;
let deck=[];
let ci=0;
let flipped=false;
let expandedTut=null;
let expandedLab=null;
let showDetail=false;

function loadProgress(){try{const d=localStorage.getItem(STORAGE_KEY);return d?JSON.parse(d):{};}catch{return{};}}
function saveProgress(p){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(p));}catch{}}

const allCards=chapters.flatMap(ch=>ch.cards.map(c=>({...c,chapterId:ch.id,chapterTitle:ch.title})));
const totalCardCount=allCards.length;

function getCurCards(){
  if(selCh==="all")return allCards;
  const ch=chapters.find(c=>c.id===selCh);
  return ch?ch.cards.map(c=>({...c,chapterId:ch.id,chapterTitle:ch.title})):[];
}

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

// ===== MATH RENDERING =====
function toLatex(s){
  return s
    .replace(/log₁₀/g,'\\log_{10}')
    .replace(/p̃/g,'\\tilde{p}').replace(/ṽ/g,'\\tilde{v}')
    .replace(/q̃/g,'\\tilde{q}').replace(/ṁ/g,'\\dot{m}')
    .replace(/f̃/g,'\\tilde{f}').replace(/F̃/g,'\\tilde{F}')
    .replace(/Ξ̃/g,'\\tilde{\\Xi}')
    .replace(/α/g,'\\alpha ').replace(/β/g,'\\beta ')
    .replace(/γ/g,'\\gamma ').replace(/δ/g,'\\delta ')
    .replace(/ε/g,'\\varepsilon ').replace(/θ/g,'\\theta ')
    .replace(/ϑ/g,'\\vartheta ').replace(/κ/g,'\\kappa ')
    .replace(/λ/g,'\\lambda ').replace(/μ/g,'\\mu ')
    .replace(/ν/g,'\\nu ').replace(/ξ/g,'\\xi ')
    .replace(/π/g,'\\pi ').replace(/ρ/g,'\\rho ')
    .replace(/σ/g,'\\sigma ').replace(/τ/g,'\\tau ')
    .replace(/φ/g,'\\varphi ').replace(/ω/g,'\\omega ')
    .replace(/Δ/g,'\\Delta ').replace(/Σ/g,'\\Sigma ')
    .replace(/Ξ/g,'\\Xi ').replace(/Γ/g,'\\Gamma ')
    .replace(/Φ/g,'\\Phi ').replace(/Ψ/g,'\\Psi ')
    .replace(/∂/g,'\\partial ').replace(/∇/g,'\\nabla ')
    .replace(/∞/g,'\\infty ').replace(/≈/g,'\\approx ')
    .replace(/≪/g,'\\ll ').replace(/≫/g,'\\gg ')
    .replace(/∝/g,'\\propto ').replace(/≠/g,'\\neq ')
    .replace(/≤/g,'\\leq ').replace(/≥/g,'\\geq ')
    .replace(/·/g,'\\cdot ').replace(/×/g,'\\times ')
    .replace(/±/g,'\\pm ').replace(/−/g,'-')
    .replace(/²/g,'^{2}').replace(/³/g,'^{3}')
    .replace(/⁴/g,'^{4}').replace(/⁶/g,'^{6}').replace(/⁸/g,'^{8}')
    .replace(/₀/g,'_{0}').replace(/₁/g,'_{1}')
    .replace(/₂/g,'_{2}').replace(/₃/g,'_{3}')
    .replace(/ₚ/g,'_{p}').replace(/ᵢ/g,'_{i}')
    .replace(/∮/g,'\\oint ').replace(/∫/g,'\\int ')
    .replace(/√/g,'\\sqrt')
    .replace(/\blg\b/g,'\\lg').replace(/\bln\b/g,'\\ln')
    .replace(/\blog\b/g,'\\log')
    .replace(/\bsin\b/g,'\\sin').replace(/\bcos\b/g,'\\cos')
    .replace(/\bcot\b/g,'\\cot').replace(/\btan\b/g,'\\tan')
    .replace(/\barctan\b/g,'\\arctan')
    .replace(/\bRe\b/g,'\\operatorname{Re}')
    .replace(/\bIm\b/g,'\\operatorname{Im}')
    .replace(/_(?!\{)([a-zA-Z]{2,})/g,'_{\\text{$1}}')
    .replace(/_(?!\{)([a-zA-Z0-9])/g,'_{$1}')
    .replace(/\^\(([^)]+)\)/g,'^{$1}');
}

function renderInlineMath(text){
  if(typeof katex==='undefined')return text.replace(/\$/g,'');
  return text.replace(/\$([^$]+)\$/g,(m,formula)=>{
    try{return katex.renderToString(toLatex(formula),{throwOnError:false,displayMode:false});}
    catch(e){return formula;}
  });
}

function renderMd(text){
  if(!text)return"";
  text=renderInlineMath(text);
  let h=text
    .replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>")
    .replace(/^(\d+)\.\s+(.+)$/gm,'<li class="num" data-n="$1">$2</li>')
    .replace(/^• (.+)$/gm,"<li>$1</li>")
    .replace(/^→ (.+)$/gm,'<li class="sub">$1</li>')
    .replace(/^> (.+)$/gm,"<blockquote>$1</blockquote>")
    .replace(/\n{2,}/g,"</p><p>")
    .replace(/\n/g,"<br/>");
  h=h.replace(/<\/blockquote>(?:<br\/?>)?<blockquote>/g,"\n");
  h=h.replace(/((?:<li[^>]*>.*?<\/li>(?:<br\/?>)?)+)/g,m=>{
    const tag=m.includes('class="num"')?"ol":"ul";
    return`<${tag}>${m.replace(/<br\/?>/g,"")}</${tag}>`;
  });
  return`<p>${h}</p>`;
}

function progressBar(known,total){
  const pct=total>0?(known/total)*100:0;
  return`<div class="prog-outer"><div class="prog-inner${pct===100?" done":""}" style="width:${pct}%"></div><span class="prog-text">${known}/${total} gewusst (${Math.round(pct)}%)</span></div>`;
}

// ===== RENDER =====
function render(){
  const app=document.getElementById("app");
  let html=`<header class="header"><h1 class="title">Technische Akustik</h1><span class="subtitle">Karteikarten & Tutorien · Teil I · ${totalCardCount} Fragen</span><div class="exam">Prüfung: 27. Feb 2026</div></header>`;

  if(mode==="menu") html+=renderMenu();
  else if(mode==="tutorials") html+=renderTutorials();
  else if(mode==="labore") html+=renderLabore();
  else if(mode==="quiz") html+=renderQuiz();
  else if(mode==="done") html+=renderDone();

  app.innerHTML=html;
  bindEvents();
}

function renderMenu(){
  const cur=getCurCards();
  const knownN=cur.filter(c=>progress[c.id]==="known").length;
  const allKnown=Object.values(progress).filter(v=>v==="known").length;
  const unknownCount=cur.filter(c=>progress[c.id]!=="known").length;

  let h=`<div class="menu">`;
  h+=`<button class="nav-btn nav-tut" data-action="tutorials"><span style="font-size:22px">📚</span><span style="flex:1">Tutorien-Zusammenfassung<span class="detail">${tutorials.length} Übungen · Prüfungsrelevante Erkenntnisse</span></span><span class="arrow">→</span></button>`;
  h+=`<button class="nav-btn nav-lab" data-action="labore"><span style="font-size:22px">🔬</span><span style="flex:1">Labore – Prüfungswissen<span class="detail">${labore.length} Versuche · Theorie, Formeln & Erkenntnisse</span></span><span class="arrow">→</span></button>`;

  h+=`<div class="panel"><h2 class="panel-title">Kapitel wählen</h2><div class="ch-list">`;
  h+=`<button class="ch-btn${selCh==="all"?" active":""}" data-ch="all"><span>📚</span><span style="flex:1;text-align:left">Alle Kapitel</span><span class="badge">${allKnown}/${totalCardCount}</span></button>`;
  chapters.forEach(ch=>{
    const k=ch.cards.filter(c=>progress[c.id]==="known").length;
    h+=`<button class="ch-btn${selCh===ch.id?" active":""}" data-ch="${ch.id}"><span>${ch.icon}</span><span style="flex:1;text-align:left;font-size:13px">${ch.title}</span><span class="badge">${k}/${ch.cards.length}</span></button>`;
  });
  h+=`</div></div>`;

  h+=`<div class="panel"><h2 class="panel-title">Lernfortschritt</h2>`;
  h+=progressBar(knownN,cur.length);
  h+=`<div class="options"><label class="ck-label"><input type="checkbox" id="ck-shuffle"${doShuffle?" checked":""}> Zufällige Reihenfolge</label><label class="ck-label"><input type="checkbox" id="ck-unknown"${onlyUnknown?" checked":""}> Nur unbekannte</label></div>`;
  h+=`<button class="start-btn" data-action="start">▶ Lernen starten <span class="count">${onlyUnknown?unknownCount:cur.length} Fragen</span></button>`;
  h+=`<button class="reset-btn" data-action="reset">Fortschritt zurücksetzen</button>`;
  h+=`</div></div>`;
  return h;
}

function renderTutorials(){
  let h=`<div class="tut-page"><button class="back-btn" data-action="menu">← Zurück zum Menü</button><div class="tut-header"><h2>📚 Tutorien-Zusammenfassung</h2><p>Prüfungsrelevante Erkenntnisse aus den Übungen – geordnet nach Tutorium</p></div><div class="acc-list">`;
  tutorials.forEach(tut=>{
    const isOpen=expandedTut===tut.id;
    h+=`<div class="acc-item${isOpen?" open":""}"><button class="acc-header" data-tut="${tut.id}"><span class="acc-icon">${tut.icon}</span><span class="acc-title">Übung ${tut.num}: ${tut.title}</span><span class="acc-kap">${tut.skriptKap}</span><span class="acc-arrow">▼</span></button>`;
    if(isOpen){
      h+=`<div class="acc-body">`;
      tut.topics.forEach(t=>{
        const isExam=t.title.includes("Prüfung");
        h+=`<div class="topic-box"><div class="topic-title${isExam?" exam-rel":""}">${isExam?"⚡ ":""}${t.title}</div><ul class="topic-list">`;
        t.points.forEach(p=>{h+=`<li>${renderInlineMath(p)}</li>`;});
        h+=`</ul></div>`;
      });
      h+=`</div>`;
    }
    h+=`</div>`;
  });
  h+=`</div></div>`;
  return h;
}

function renderLabore(){
  let h=`<div class="lab-page"><button class="back-btn" data-action="menu">← Zurück zum Menü</button><div class="tut-header"><h2>🔬 Labore – Prüfungswissen</h2><p>Theorie, Formeln & Erkenntnisse aus den 4 Laborversuchen</p></div><div class="acc-list">`;
  labore.forEach(lab=>{
    const isOpen=expandedLab===lab.id;
    h+=`<div class="acc-item lab${isOpen?" open":""}"><button class="acc-header" data-lab="${lab.id}"><span class="acc-icon">${lab.icon}</span><span class="acc-title">Versuch ${lab.num}: ${lab.title}</span>${lab.norm!=="–"?`<span class="acc-kap">${lab.norm}</span>`:""}<span class="acc-arrow">▼</span></button>`;
    if(isOpen){
      h+=`<div class="acc-body">`;
      lab.topics.forEach(t=>{
        const isExam=t.title.includes("⚡");
        h+=`<div class="topic-box"><div class="topic-title${isExam?" lab-rel":""}">${t.title}</div><ul class="topic-list">`;
        t.points.forEach(p=>{h+=`<li>${renderInlineMath(p)}</li>`;});
        h+=`</ul></div>`;
      });
      h+=`</div>`;
    }
    h+=`</div>`;
  });
  h+=`</div></div>`;
  return h;
}

function renderQuiz(){
  if(!deck.length)return"";
  const card=deck[ci];
  const knownSoFar=deck.slice(0,ci).filter(c=>progress[c.id]==="known").length;
  let h=`<div class="quiz-c"><button class="back-btn" data-action="menu">← Zurück</button>`;
  h+=progressBar(knownSoFar,deck.length);
  h+=`<div class="card-count">Frage ${ci+1} von ${deck.length}</div>`;

  if(!flipped){
    h+=`<div class="card" data-action="flip"><div class="card-label">FRAGE</div><div class="q-text">${card.q}</div><div class="hint">Antippen zum Aufdecken</div></div>`;
  } else {
    h+=`<div class="card"><div class="card-label">ANTWORT</div><div class="a-text"><div class="ans">${renderMd(card.a)}</div></div></div>`;
    if(card.detail){
      h+=`<button class="detail-toggle${showDetail?" open":""}" data-action="toggle-detail"><span class="arrow">▼</span> Ausführliche Antwort (Mündliche Prüfung)</button>`;
      if(showDetail){
        h+=`<div class="detail-card"><div class="card-label">AUSFÜHRLICHE ANTWORT</div><div class="detail-text">${renderMd(card.detail)}</div></div>`;
      }
    }
    h+=`<div class="rate-btns"><button class="r-btn r-red" data-rate="unknown">✗ Nicht gewusst</button><button class="r-btn r-green" data-rate="known">✓ Gewusst</button></div>`;
  }
  h+=`<div class="ch-tag">${card.chapterTitle}</div></div>`;
  return h;
}

function renderDone(){
  const knownCount=deck.filter(c=>progress[c.id]==="known").length;
  const unknownCount=deck.filter(c=>progress[c.id]!=="known").length;
  let h=`<div class="done-c"><div class="emoji">🎉</div><h2>Geschafft!</h2><div class="done-stats"><div><span style="color:#22c55e;font-weight:700">✓ ${knownCount}</span> gewusst</div><div><span style="color:#ef4444;font-weight:700">✗ ${unknownCount}</span> wiederholen</div></div><div class="done-btns">`;
  if(unknownCount>0) h+=`<button class="start-btn" style="flex:none;padding:12px 24px" data-action="repeat">🔁 Unbekannte wiederholen</button>`;
  h+=`<button class="back-btn" style="margin:0" data-action="menu">← Menü</button></div></div>`;
  return h;
}

// ===== EVENTS =====
function bindEvents(){
  document.querySelectorAll("[data-action]").forEach(el=>{
    el.addEventListener("click",e=>{
      const a=el.dataset.action;
      if(a==="menu"){mode="menu";expandedTut=null;expandedLab=null;render();}
      else if(a==="tutorials"){mode="tutorials";render();}
      else if(a==="labore"){mode="labore";render();}
      else if(a==="start"){startQuiz();}
      else if(a==="repeat"){onlyUnknown=true;startQuiz();}
      else if(a==="reset"){progress={};saveProgress(progress);render();}
      else if(a==="flip"){flipped=true;render();}
      else if(a==="toggle-detail"){showDetail=!showDetail;render();if(showDetail){const dc=document.querySelector(".detail-card");if(dc)dc.scrollIntoView({behavior:"smooth",block:"nearest"});}}
    });
  });

  document.querySelectorAll("[data-ch]").forEach(el=>{
    el.addEventListener("click",()=>{selCh=el.dataset.ch;render();});
  });

  document.querySelectorAll("[data-rate]").forEach(el=>{
    el.addEventListener("click",()=>{
      const r=el.dataset.rate;
      progress[deck[ci].id]=r;
      saveProgress(progress);
      showDetail=false;
      if(ci+1<deck.length){ci++;flipped=false;render();}
      else{mode="done";render();}
    });
  });

  document.querySelectorAll("[data-tut]").forEach(el=>{
    el.addEventListener("click",()=>{expandedTut=expandedTut===el.dataset.tut?null:el.dataset.tut;render();});
  });

  document.querySelectorAll("[data-lab]").forEach(el=>{
    el.addEventListener("click",()=>{expandedLab=expandedLab===el.dataset.lab?null:el.dataset.lab;render();});
  });

  const ckShuffle=document.getElementById("ck-shuffle");
  if(ckShuffle)ckShuffle.addEventListener("change",e=>{doShuffle=e.target.checked;render();});

  const ckUnknown=document.getElementById("ck-unknown");
  if(ckUnknown)ckUnknown.addEventListener("change",e=>{onlyUnknown=e.target.checked;render();});
}

function startQuiz(){
  let cards=getCurCards();
  if(onlyUnknown)cards=cards.filter(c=>progress[c.id]!=="known");
  if(!cards.length)return;
  deck=doShuffle?shuffle(cards):[...cards];
  ci=0;flipped=false;mode="quiz";render();
}

// ===== INIT =====
progress=loadProgress();
render();
</script>
