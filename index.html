function loadProgress(){try{const d=localStorage.getItem(STORAGE_KEY);return d?JSON.parse(d):{};}catch{return{};}}
function saveProgress(p){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(p));}catch{}}

const allCards=chapters.flatMap(ch=>ch.cards.map(c=>({...c,chapterId:ch.id,chapterTitle:ch.title})));
const totalCardCount=allCards.length;

function getCurCards(){
  if(selCh==="all")return allCards;
  const ch=chapters.find(c=>c.id===selCh);
  return ch?ch.cards.map(c=>({...c,chapterId:ch.id,chapterTitle:ch.title})):[];
}

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

// ===== MATH RENDERING =====
function toLatex(s){
  return s
    .replace(/log₁₀/g,'\\log_{10}')
    .replace(/p̃/g,'\\tilde{p}').replace(/ṽ/g,'\\tilde{v}')
    .replace(/q̃/g,'\\tilde{q}').replace(/ṁ/g,'\\dot{m}')
    .replace(/f̃/g,'\\tilde{f}').replace(/F̃/g,'\\tilde{F}')
    .replace(/Ξ̃/g,'\\tilde{\\Xi}')
    .replace(/α/g,'\\alpha ').replace(/β/g,'\\beta ')
    .replace(/γ/g,'\\gamma ').replace(/δ/g,'\\delta ')
    .replace(/ε/g,'\\varepsilon ').replace(/θ/g,'\\theta ')
    .replace(/ϑ/g,'\\vartheta ').replace(/κ/g,'\\kappa ')
    .replace(/λ/g,'\\lambda ').replace(/μ/g,'\\mu ')
    .replace(/ν/g,'\\nu ').replace(/ξ/g,'\\xi ')
    .replace(/π/g,'\\pi ').replace(/ρ/g,'\\rho ')
    .replace(/σ/g,'\\sigma ').replace(/τ/g,'\\tau ')
    .replace(/φ/g,'\\varphi ').replace(/ω/g,'\\omega ')
    .replace(/Δ/g,'\\Delta ').replace(/Σ/g,'\\Sigma ')
    .replace(/Ξ/g,'\\Xi ').replace(/Γ/g,'\\Gamma ')
    .replace(/Φ/g,'\\Phi ').replace(/Ψ/g,'\\Psi ')
    .replace(/∂/g,'\\partial ').replace(/∇/g,'\\nabla ')
    .replace(/∞/g,'\\infty ').replace(/≈/g,'\\approx ')
    .replace(/≪/g,'\\ll ').replace(/≫/g,'\\gg ')
    .replace(/∝/g,'\\propto ').replace(/≠/g,'\\neq ')
    .replace(/≤/g,'\\leq ').replace(/≥/g,'\\geq ')
    .replace(/·/g,'\\cdot ').replace(/×/g,'\\times ')
    .replace(/±/g,'\\pm ').replace(/−/g,'-')
    .replace(/²/g,'^{2}').replace(/³/g,'^{3}')
    .replace(/⁴/g,'^{4}').replace(/⁶/g,'^{6}').replace(/⁸/g,'^{8}')
    .replace(/₀/g,'_{0}').replace(/₁/g,'_{1}')
    .replace(/₂/g,'_{2}').replace(/₃/g,'_{3}')
    .replace(/ₚ/g,'_{p}').replace(/ᵢ/g,'_{i}')
    .replace(/∮/g,'\\oint ').replace(/∫/g,'\\int ')
    .replace(/√/g,'\\sqrt')
    .replace(/\blg\b/g,'\\lg').replace(/\bln\b/g,'\\ln')
    .replace(/\blog\b/g,'\\log')
    .replace(/\bsin\b/g,'\\sin').replace(/\bcos\b/g,'\\cos')
    .replace(/\bcot\b/g,'\\cot').replace(/\btan\b/g,'\\tan')
    .replace(/\barctan\b/g,'\\arctan')
    .replace(/\bRe\b/g,'\\operatorname{Re}')
    .replace(/\bIm\b/g,'\\operatorname{Im}')
    .replace(/_(?!\{)([a-zA-Z]{2,})/g,'_{\\text{$1}}')
    .replace(/_(?!\{)([a-zA-Z0-9])/g,'_{$1}')
    .replace(/\^\(([^)]+)\)/g,'^{$1}');
}

function renderInlineMath(text){
  if(typeof katex==='undefined')return text.replace(/\$/g,'');
  return text.replace(/\$([^$]+)\$/g,(m,formula)=>{
    try{return katex.renderToString(toLatex(formula),{throwOnError:false,displayMode:false});}
    catch(e){return formula;}
  });
}

function renderMd(text){
  if(!text)return"";
  text=renderInlineMath(text);
  let h=text
    .replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>")
    .replace(/^(\d+)\.\s+(.+)$/gm,'<li class="num" data-n="$1">$2</li>')
    .replace(/^• (.+)$/gm,"<li>$1</li>")
    .replace(/^→ (.+)$/gm,'<li class="sub">$1</li>')
    .replace(/^> (.+)$/gm,"<blockquote>$1</blockquote>")
    .replace(/\n{2,}/g,"</p><p>")
    .replace(/\n/g,"<br/>");
  h=h.replace(/<\/blockquote>(?:<br\/?>)?<blockquote>/g,"\n");
  h=h.replace(/((?:<li[^>]*>.*?<\/li>(?:<br\/?>)?)+)/g,m=>{
    const tag=m.includes('class="num"')?"ol":"ul";
    return`<${tag}>${m.replace(/<br\/?>/g,"")}</${tag}>`;
  });
  return`<p>${h}</p>`;
}

function progressBar(known,total){
  const pct=total>0?(known/total)*100:0;
  return`<div class="prog-outer"><div class="prog-inner${pct===100?" done":""}" style="width:${pct}%"></div><span class="prog-text">${known}/${total} gewusst (${Math.round(pct)}%)</span></div>`;
}

// ===== RENDER =====
function render(){
  const app=document.getElementById("app");
  let html=`<header class="header"><h1 class="title">Technische Akustik</h1><span class="subtitle">Karteikarten & Tutorien · Teil I · ${totalCardCount} Fragen</span><div class="exam">Prüfung: 27. Feb 2026</div></header>`;

  if(mode==="menu") html+=renderMenu();
  else if(mode==="tutorials") html+=renderTutorials();
  else if(mode==="labore") html+=renderLabore();
  else if(mode==="quiz") html+=renderQuiz();
  else if(mode==="done") html+=renderDone();
  else if(mode==="glossar") html+=renderGlossar();

  app.innerHTML=html;
  bindEvents();
  if(mode==="quiz"&&showIx&&deck[ci]){mountIx(deck[ci].id);}
  if(mode==="glossar"&&glossarShowIx&&expandedGlossar){mountGlossarIx(expandedGlossar);}
}

function renderMenu(){
  const cur=getCurCards();
  const knownN=cur.filter(c=>progress[c.id]==="known").length;
  const allKnown=Object.values(progress).filter(v=>v==="known").length;
  const unknownCount=cur.filter(c=>progress[c.id]!=="known").length;

  let h=`<div class="menu">`;
  h+=`<button class="nav-btn nav-tut" data-action="tutorials"><span style="font-size:22px">📚</span><span style="flex:1">Tutorien-Zusammenfassung<span class="detail">${tutorials.length} Übungen · Prüfungsrelevante Erkenntnisse</span></span><span class="arrow">→</span></button>`;
  h+=`<button class="nav-btn nav-lab" data-action="labore"><span style="font-size:22px">🔬</span><span style="flex:1">Labore – Prüfungswissen<span class="detail">${labore.length} Versuche · Theorie, Formeln & Erkenntnisse</span></span><span class="arrow">→</span></button>`;
  h+=`<button class="nav-btn nav-glos" data-action="glossar"><span style="font-size:22px">📖</span><span style="flex:1">Glossar – Alle Begriffe<span class="detail">${glossar.length} Fachbegriffe · Kapitel 1–14</span></span><span class="arrow">→</span></button>`;

  h+=`<div class="panel"><h2 class="panel-title">Kapitel wählen</h2><div class="ch-list">`;
  h+=`<button class="ch-btn${selCh==="all"?" active":""}" data-ch="all"><span>📚</span><span style="flex:1;text-align:left">Alle Kapitel</span><span class="badge">${allKnown}/${totalCardCount}</span></button>`;
  chapters.forEach(ch=>{
    const k=ch.cards.filter(c=>progress[c.id]==="known").length;
    h+=`<button class="ch-btn${selCh===ch.id?" active":""}" data-ch="${ch.id}"><span>${ch.icon}</span><span style="flex:1;text-align:left;font-size:13px">${ch.title}</span><span class="badge">${k}/${ch.cards.length}</span></button>`;
  });
  h+=`</div></div>`;

  h+=`<div class="panel"><h2 class="panel-title">Lernfortschritt</h2>`;
  h+=progressBar(knownN,cur.length);
  h+=`<div class="options"><label class="ck-label"><input type="checkbox" id="ck-shuffle"${doShuffle?" checked":""}> Zufällige Reihenfolge</label><label class="ck-label"><input type="checkbox" id="ck-unknown"${onlyUnknown?" checked":""}> Nur unbekannte</label></div>`;
  h+=`<button class="start-btn" data-action="start">▶ Lernen starten <span class="count">${onlyUnknown?unknownCount:cur.length} Fragen</span></button>`;
  h+=`<button class="reset-btn" data-action="reset">Fortschritt zurücksetzen</button>`;
  h+=`</div></div>`;
  return h;
}

  let h=`<div class="tut-page"><button class="back-btn" data-action="menu">← Zurück zum Menü</button><div class="tut-header"><h2>📚 Tutorien-Zusammenfassung</h2><p>Prüfungsrelevante Erkenntnisse aus den Übungen – geordnet nach Tutorium</p></div><div class="acc-list">`;

function renderGlossar(){
  let terms=glossarChFilter==="all"?glossar:glossar.filter(g=>g.chId===glossarChFilter);
  if(glossarSearch.trim()){
    const q=glossarSearch.trim().toLowerCase();
    terms=terms.filter(g=>g.term.toLowerCase().includes(q)||g.brief.toLowerCase().includes(q)||(g.detail&&g.detail.toLowerCase().includes(q))||(g.formula&&g.formula.toLowerCase().includes(q)));
  }
  let h=`<div class="glos-page"><button class="back-btn" data-action="menu">← Zurück zum Menü</button>`;
  h+=`<div class="glos-header"><h2>📖 Glossar – Fachbegriffe</h2><p>Alle wichtigen Begriffe der Technischen Akustik, geordnet nach Kapitel</p></div>`;
  h+=`<div class="glos-search"><div class="glos-search-wrap"><span class="glos-search-icon">🔍</span><input type="text" id="glos-search-input" placeholder="Begriff suchen..." value="${glossarSearch.replace(/"/g,'&quot;')}"></div></div>`;
  h+=`<div class="glos-filters">`;
  h+=`<button class="glos-chip${glossarChFilter==="all"?" active":""}" data-glos-ch="all">Alle</button>`;
  chapters.forEach(ch=>{
    const cnt=glossar.filter(g=>g.chId===ch.id).length;
    if(cnt>0)h+=`<button class="glos-chip${glossarChFilter===ch.id?" active":""}" data-glos-ch="${ch.id}">${ch.icon} ${ch.title.split(" – ")[0]}<span style="opacity:.5;margin-left:4px">${cnt}</span></button>`;
  });
  h+=`</div>`;
  h+=`<div class="glos-count">${terms.length} Begriff${terms.length!==1?"e":""}${glossarSearch?" gefunden":""}</div>`;
  if(!terms.length){
    h+=`<div class="glos-empty">Kein Begriff gefunden für „${glossarSearch}"</div>`;
  } else {
    h+=`<div class="acc-list">`;
    terms.forEach(g=>{
      const isOpen=expandedGlossar===g.id;
      h+=`<div class="acc-item glos${isOpen?" open":""}">`;
      h+=`<button class="acc-header" data-glos="${g.id}"><span class="acc-title" style="flex:1">${g.term}${!isOpen&&g.brief?`<span class="glos-brief">${g.brief}</span>`:""}</span><span class="glos-section">${g.section||""}</span><span class="acc-arrow">▼</span></button>`;
      if(isOpen){
        h+=`<div class="acc-body">`;
        if(g.formula) h+=`<div class="glos-formula">${renderInlineMath(g.formula)}</div>`;
        if(g.detail) h+=`<div class="detail-text">${renderMd(g.detail)}</div>`;
        if(g.quote) h+=`<div class="detail-text"><blockquote>${g.quote}</blockquote>${g.section?`<span class="glos-quelle">${g.section}</span>`:""}</div>`;
        if(g.ix&&glossarIx&&glossarIx[g.ix]){
          h+=`<button class="ix-toggle${glossarShowIx?" open":""}" data-action="toggle-glos-ix"><span class="arrow">▼</span> Interaktiv erkunden</button>`;
          if(glossarShowIx){h+=`<div class="ix-container" id="glos-ix-mount"></div>`;}
        }
        h+=`</div>`;
      }
      h+=`</div>`;
    });
    h+=`</div>`;
  }
  h+=`</div>`;
  return h;
}

function renderQuiz(){
  if(!deck.length)return"";
  const card=deck[ci];
  const knownSoFar=deck.slice(0,ci).filter(c=>progress[c.id]==="known").length;
  let h=`<div class="quiz-c"><button class="back-btn" data-action="menu">← Zurück</button>`;
  h+=progressBar(knownSoFar,deck.length);
  h+=`<div class="card-count">Frage ${ci+1} von ${deck.length}</div>`;

  if(!flipped){
    h+=`<div class="card" data-action="flip"><div class="card-label">FRAGE</div><div class="q-text">${card.q}</div><div class="hint">Antippen zum Aufdecken</div></div>`;
  } else {
    h+=`<div class="card"><div class="card-label">ANTWORT</div><div class="a-text"><div class="ans">${renderMd(card.a)}</div></div></div>`;
    if(card.detail){
      h+=`<button class="detail-toggle${showDetail?" open":""}" data-action="toggle-detail"><span class="arrow">▼</span> Ausführliche Antwort (Mündliche Prüfung)</button>`;
      if(showDetail){
        h+=`<div class="detail-card"><div class="card-label">AUSFÜHRLICHE ANTWORT</div><div class="detail-text">${renderMd(card.detail)}</div></div>`;
      }
    }
    if(cardIx[card.id]){
      h+=`<button class="ix-toggle${showIx?" open":""}" data-action="toggle-ix"><span class="arrow">▼</span> Interaktiv erkunden</button>`;
      if(showIx){h+=`<div class="ix-container" id="ix-mount"></div>`;}
    }
    h+=`<div class="rate-btns"><button class="r-btn r-red" data-rate="unknown">✗ Nicht gewusst</button><button class="r-btn r-green" data-rate="known">✓ Gewusst</button></div>`;
  }
  h+=`<div class="ch-tag">${card.chapterTitle}</div></div>`;
  return h;
}

function renderDone(){
  const knownCount=deck.filter(c=>progress[c.id]==="known").length;
  const unknownCount=deck.filter(c=>progress[c.id]!=="known").length;
  let h=`<div class="done-c"><div class="emoji">🎉</div><h2>Geschafft!</h2><div class="done-stats"><div><span style="color:#22c55e;font-weight:700">✓ ${knownCount}</span> gewusst</div><div><span style="color:#ef4444;font-weight:700">✗ ${unknownCount}</span> wiederholen</div></div><div class="done-btns">`;
  if(unknownCount>0) h+=`<button class="start-btn" style="flex:none;padding:12px 24px" data-action="repeat">🔁 Unbekannte wiederholen</button>`;
  h+=`<button class="back-btn" style="margin:0" data-action="menu">← Menü</button></div></div>`;
  return h;
}

// ===== EVENTS =====
function bindEvents(){
  document.querySelectorAll("[data-action]").forEach(el=>{
    el.addEventListener("click",e=>{
      const a=el.dataset.action;
      if(a==="menu"){mode="menu";expandedTut=null;expandedLab=null;expandedGlossar=null;glossarShowIx=false;cleanAnims();showIx=false;render();}
      else if(a==="tutorials"){mode="tutorials";render();}
      else if(a==="labore"){mode="labore";render();}
      else if(a==="glossar"){mode="glossar";glossarSearch="";glossarChFilter="all";expandedGlossar=null;glossarShowIx=false;render();}
      else if(a==="start"){startQuiz();}
      else if(a==="repeat"){onlyUnknown=true;startQuiz();}
      else if(a==="reset"){progress={};saveProgress(progress);render();}
      else if(a==="flip"){flipped=true;render();}
      else if(a==="toggle-detail"){showDetail=!showDetail;render();if(showDetail){const dc=document.querySelector(".detail-card");if(dc)dc.scrollIntoView({behavior:"smooth",block:"nearest"});}}
      else if(a==="toggle-ix"){cleanAnims();showIx=!showIx;render();if(showIx){mountIx(deck[ci].id);const ic=document.querySelector(".ix-container");if(ic)ic.scrollIntoView({behavior:"smooth",block:"nearest"});}}
      else if(a==="toggle-glos-ix"){cleanAnims();glossarShowIx=!glossarShowIx;render();if(glossarShowIx&&expandedGlossar){mountGlossarIx(expandedGlossar);const ic=document.querySelector(".ix-container");if(ic)ic.scrollIntoView({behavior:"smooth",block:"nearest"});}}
    });
  });

  document.querySelectorAll("[data-ch]").forEach(el=>{
    el.addEventListener("click",()=>{selCh=el.dataset.ch;render();});
  });

  document.querySelectorAll("[data-rate]").forEach(el=>{
    el.addEventListener("click",()=>{
      const r=el.dataset.rate;
      progress[deck[ci].id]=r;
      saveProgress(progress);
      showDetail=false;showIx=false;cleanAnims();
      if(ci+1<deck.length){ci++;flipped=false;render();}
      else{mode="done";render();}
    });
  });

  document.querySelectorAll("[data-tut]").forEach(el=>{
    el.addEventListener("click",()=>{expandedTut=expandedTut===el.dataset.tut?null:el.dataset.tut;render();});
  });

  document.querySelectorAll("[data-lab]").forEach(el=>{
    el.addEventListener("click",()=>{expandedLab=expandedLab===el.dataset.lab?null:el.dataset.lab;render();});
  });

  document.querySelectorAll("[data-glos-ch]").forEach(el=>{
    el.addEventListener("click",()=>{glossarChFilter=el.dataset.glosCh;expandedGlossar=null;glossarShowIx=false;render();});
  });

  document.querySelectorAll("[data-glos]").forEach(el=>{
    el.addEventListener("click",()=>{
      const id=el.dataset.glos;
      if(expandedGlossar===id){expandedGlossar=null;glossarShowIx=false;}
      else{expandedGlossar=id;glossarShowIx=false;}
      cleanAnims();render();
    });
  });

  const glossInput=document.getElementById("glos-search-input");
  if(glossInput){
    glossInput.addEventListener("input",e=>{
      glossarSearch=e.target.value;expandedGlossar=null;glossarShowIx=false;
      render();
      const ni=document.getElementById("glos-search-input");
      if(ni){ni.focus();ni.selectionStart=ni.selectionEnd=ni.value.length;}
    });
  }

  const ckShuffle=document.getElementById("ck-shuffle");
  if(ckShuffle)ckShuffle.addEventListener("change",e=>{doShuffle=e.target.checked;render();});

  const ckUnknown=document.getElementById("ck-unknown");
  if(ckUnknown)ckUnknown.addEventListener("change",e=>{onlyUnknown=e.target.checked;render();});
}

function startQuiz(){
  let cards=getCurCards();
  if(onlyUnknown)cards=cards.filter(c=>progress[c.id]!=="known");
  if(!cards.length)return;
  deck=doShuffle?shuffle(cards):[...cards];
  ci=0;flipped=false;mode="quiz";render();
}

// --- Reusable: Slider ---
function mkSlider(el,o){
  const g=document.createElement('div');g.className='ix-sg';
  const l=document.createElement('label');l.textContent=o.label||'';
  const inp=document.createElement('input');inp.type='range';
  inp.min=o.min;inp.max=o.max;inp.step=o.step||'any';inp.value=o.value;
  const v=document.createElement('div');v.className='ix-val';
  g.append(l,inp,v);el.appendChild(g);
  return{inp,val:v,g};
}

// --- Reusable: Canvas ---
function mkCanvas(el,w,h){
  const dpr=window.devicePixelRatio||1;
  const c=document.createElement('canvas');
  c.width=w*dpr;c.height=h*dpr;
  c.style.width=w+'px';c.style.height=h+'px';
  c.style.maxWidth='100%';
  const ctx=c.getContext('2d');ctx.scale(dpr,dpr);
  el.appendChild(c);return{c,ctx,w,h};
}

// --- Reusable: Polar Plot ---
function drawPolar(ctx,cx,cy,R,patterns,showGrid){
  ctx.save();
  if(showGrid!==false){
    ctx.strokeStyle='rgba(148,163,184,.15)';ctx.lineWidth=1;
    for(let i=1;i<=4;i++){ctx.beginPath();ctx.arc(cx,cy,R*i/4,0,Math.PI*2);ctx.stroke();}
    for(let a=0;a<360;a+=30){const r=a*Math.PI/180;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+R*Math.cos(r),cy-R*Math.sin(r));ctx.stroke();}
  }
  patterns.forEach(p=>{
    ctx.beginPath();ctx.strokeStyle=p.color;ctx.lineWidth=2;
    for(let i=0;i<=360;i++){
      const th=i*Math.PI/180;const rv=Math.abs(p.fn(th))*R;
      const x=cx+rv*Math.cos(th),y=cy-rv*Math.sin(th);
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.closePath();ctx.stroke();
    ctx.fillStyle=p.color.replace(')',',0.08)').replace('rgb','rgba');
    ctx.fill();
  });
  ctx.restore();
}

// --- Reusable: Tabs ---
function mkTabs(el,labels,onChange){
  const wrap=document.createElement('div');wrap.className='ix-tabs';
  const btns=labels.map((lb,i)=>{
    const b=document.createElement('button');b.className='ix-tab'+(i===0?' active':'');
    b.textContent=lb;
    b.onclick=()=>{btns.forEach(x=>x.className='ix-tab');b.className='ix-tab active';onChange(i);};
    wrap.appendChild(b);return b;
  });
  el.appendChild(wrap);return btns;
}

// --- q03: Schallschnelle vs Schallgeschwindigkeit ---
function ixQ03(el){
  const {ctx,w,h}=mkCanvas(el,300,150);
  let t=0;
  const N=25;
  function draw(){
    ctx.clearRect(0,0,w,h);
    ctx.fillStyle='#0f172a';ctx.fillRect(0,0,w,h);
    const pulseX=((t*80)%(w+60))-30;
    for(let i=0;i<N;i++){
      const bx=10+i*(w-20)/(N-1),by=h/2;
      const dist=bx-pulseX;
      const env=Math.exp(-dist*dist/600);
      const dx=env*Math.sin(dist*0.15)*12;
      ctx.beginPath();ctx.arc(bx+dx,by,4,0,Math.PI*2);
      ctx.fillStyle=`rgba(167,139,250,${0.3+env*0.7})`;ctx.fill();
    }
    // pulse indicator
    ctx.strokeStyle='rgba(245,158,11,0.4)';ctx.lineWidth=1.5;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(pulseX,15);ctx.lineTo(pulseX,h-15);ctx.stroke();ctx.setLineDash([]);
    // labels
    ctx.font='11px system-ui';ctx.fillStyle='#a78bfa';ctx.fillText('← ṽ: Teilchen schwingen lokal →',10,16);
    ctx.fillStyle='#f59e0b';ctx.fillText('c: Wellenfront propagiert →',10,h-6);
    t+=1/60;
    activeAnims.push(requestAnimationFrame(draw));
  }
  draw();
  mkInfo(el,'Teilchen (violett) schwingen hin/her, die Wellenfront (orange) wandert durch.');
}

// --- q04: Ohr-Beschriftungsquiz ---
function ixQ04(el){
  const parts=[
    {name:'Ohrmuschel',x:15,y:35},{name:'Gehörgang',x:30,y:50},
    {name:'Trommelfell',x:42,y:50},{name:'Hammer/Amboss/Steigbügel',x:55,y:40},

  const correct=[0,0,0,1,2,2];// zone index for each part
  const colors=['#f59e0b','#a78bfa','#38bdf8'];
  let answers={},selItem=null,checked=false;

  function redraw(){
    el.innerHTML='';
    // zones header
    const zh=document.createElement('div');zh.className='ix-quiz-cats';
    zones.forEach((z,i)=>{
      const d=document.createElement('div');d.className='ix-quiz-cat';
      d.style.borderColor=colors[i];d.style.color=colors[i];
      d.textContent=z;zh.appendChild(d);

    parts.forEach((p,i)=>{
      const b=document.createElement('button');
      b.className='ix-quiz-item'+(selItem===i?' sel':'')+(answers[i]!=null?' placed':'');
      if(checked){b.className='ix-quiz-item '+(answers[i]===correct[i]?'correct':'wrong');}
      b.textContent=p.name+(answers[i]!=null&&!checked?' → '+zones[answers[i]]:'');
      if(!checked){
        b.onclick=()=>{
          if(answers[i]!=null){delete answers[i];selItem=null;redraw();return;}
          selItem=i;redraw();
        };
      }
      ig.appendChild(b);
    });
    el.appendChild(ig);
    // zone tap targets (when item selected)
    if(selItem!==null&&!checked){
      const zt=document.createElement('div');zt.className='ix-quiz-cats';
      zones.forEach((z,i)=>{
        const b=document.createElement('button');b.className='ix-quiz-cat active';
        b.style.borderColor=colors[i];b.style.color=colors[i];b.textContent='→ '+z;
        b.onclick=()=>{answers[selItem]=i;selItem=null;redraw();};
        zt.appendChild(b);
      });
      el.appendChild(zt);
      mkInfo(el,'Tippe auf eine Zone um "'+parts[selItem].name+'" zuzuordnen');
    }
    // check button
    if(Object.keys(answers).length===parts.length&&!checked){
      const cb=document.createElement('button');cb.className='ix-btn';cb.textContent='✓ Überprüfen';
      cb.onclick=()=>{checked=true;redraw();};
      el.appendChild(cb);
    }
    if(checked){
      const sc=parts.filter((_,i)=>answers[i]===correct[i]).length;
      const o=mkOut(el);o.innerHTML=`<strong>${sc}/${parts.length}</strong> richtig zugeordnet`;
      const rb=document.createElement('button');rb.className='ix-btn';rb.textContent='↻ Nochmal';rb.style.marginTop='8px';
      rb.onclick=()=>{answers={};selItem=null;checked=false;redraw();};
      el.appendChild(rb);
    }
  }
  redraw();
}

// --- q06: Isophonen ---
function ixQ06(el){
  const {ctx,w,h}=mkCanvas(el,300,200);
  // Simplified equal-loudness contour data (phon values at octave frequencies)
  // freq: 31,63,125,250,500,1k,2k,4k,8k,16k
  const freqs=[31,63,125,250,500,1000,2000,4000,8000,16000];
  const curves={
    20:[72,52,37,27,22,20,16,14,22,52],
    40:[85,68,55,46,42,40,38,36,40,64],
    60:[96,82,72,64,60,60,57,56,60,78],
    80:[108,96,88,82,78,80,77,74,78,92]
  };
  const colors={'20':'#22c55e','40':'#f59e0b','60':'#a78bfa','80':'#ef4444'};
  function fToX(f){return 20+Math.log10(f/20)/Math.log10(20000/20)*(w-40);}
  function dBToY(db){return h-20-(db/120)*(h-40);}
  ctx.fillStyle='#0f172a';ctx.fillRect(0,0,w,h);
  // grid
  ctx.strokeStyle='rgba(148,163,184,.1)';ctx.lineWidth=0.5;
  [20,40,60,80,100,120].forEach(db=>{ctx.beginPath();ctx.moveTo(20,dBToY(db));ctx.lineTo(w-10,dBToY(db));ctx.stroke();
    ctx.fillStyle='#475569';ctx.font='9px system-ui';ctx.fillText(db+'dB',0,dBToY(db)+3);});
  [63,125,250,500,1000,2000,4000,8000].forEach(f=>{ctx.beginPath();ctx.moveTo(fToX(f),15);ctx.lineTo(fToX(f),h-15);ctx.stroke();
    ctx.fillStyle='#475569';ctx.font='9px system-ui';ctx.fillText(f>=1000?(f/1000)+'k':f,fToX(f)-8,h-4);});
  // curves
  Object.entries(curves).forEach(([phon,dbs])=>{
    ctx.beginPath();ctx.strokeStyle=colors[phon];ctx.lineWidth=2;
    dbs.forEach((db,i)=>{const x=fToX(freqs[i]),y=dBToY(db);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
    ctx.stroke();
    ctx.fillStyle=colors[phon];ctx.font='bold 10px system-ui';
    ctx.fillText(phon+' phon',fToX(freqs[5])+4,dBToY(curves[phon][5])-6);
  });
  mkLegend(el,[{color:'#22c55e',label:'20 phon (leise)'},{color:'#f59e0b',label:'40 phon'},{color:'#a78bfa',label:'60 phon'},{color:'#ef4444',label:'80 phon (laut)'}]);
  mkInfo(el,'Isophonen: Kurven gleicher empfundener Lautstärke. Bei 1 kHz stimmen dB und phon überein.');
}

// --- q07: A-Bewertung ---
function ixQ07(el){
  const row=document.createElement('div');row.className='ix-row';
  const {inp,val}=mkSlider(row,{label:'Frequenz',min:1.3,max:4.2,step:0.01,value:3});
  el.appendChild(row);
  const {ctx,w,h}=mkCanvas(el,300,160);
  const out=mkOut(el);
  // A-weighting corrections (dB) at standard frequencies
  const aData=[[20,-50.5],[31.5,-39.4],[63,-26.2],[125,-16.1],[250,-8.6],[500,-3.2],[1000,0],[2000,1.2],[4000,1.0],[8000,-1.1],[16000,-6.6]];
  function interp(f){
    for(let i=0;i<aData.length-1;i++){
      if(f>=aData[i][0]&&f<=aData[i+1][0]){
        const t=(Math.log10(f)-Math.log10(aData[i][0]))/(Math.log10(aData[i+1][0])-Math.log10(aData[i][0]));
        return aData[i][1]+t*(aData[i+1][1]-aData[i][1]);
      }
    }
    return f<aData[0][0]?aData[0][1]:aData[aData.length-1][1];
  }
  function fToX(f){return 15+Math.log10(f/20)/Math.log10(20000/20)*(w-30);}
  function dBToY(db){return h/2-(db/60)*(h-30);}
  function draw(){
    const f=Math.pow(10,parseFloat(inp.value));
    const ka=interp(f);
    val.innerHTML=`<span>${f>=1000?(f/1000).toFixed(1)+' kHz':Math.round(f)+' Hz'}</span>`;
    ctx.clearRect(0,0,w,h);ctx.fillStyle='#0f172a';ctx.fillRect(0,0,w,h);
    // zero line
    ctx.strokeStyle='rgba(148,163,184,.2)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(10,dBToY(0));ctx.lineTo(w-5,dBToY(0));ctx.stroke();
    ctx.fillStyle='#475569';ctx.font='9px system-ui';ctx.fillText('0 dB',0,dBToY(0)-4);
    // curve
    ctx.beginPath();ctx.strokeStyle='#a78bfa';ctx.lineWidth=2;
    for(let lf=1.3;lf<=4.2;lf+=0.02){
      const ff=Math.pow(10,lf),a=interp(ff);
      const x=fToX(ff),y=dBToY(a);
      lf===1.3?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.stroke();
    // marker
    const mx=fToX(f),my=dBToY(ka);
    ctx.beginPath();ctx.arc(mx,my,5,0,Math.PI*2);
    ctx.fillStyle='#f59e0b';ctx.fill();
    ctx.strokeStyle='rgba(245,158,11,.3)';ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.moveTo(mx,0);ctx.lineTo(mx,h);ctx.stroke();ctx.setLineDash([]);
    // axis labels
    [63,250,1000,4000,16000].forEach(ff=>{
      ctx.fillStyle='#475569';ctx.font='9px system-ui';
      ctx.fillText(ff>=1000?(ff/1000)+'k':ff,fToX(ff)-6,h-3);
    });
    out.innerHTML=`K<sub>A</sub> bei <strong>${f>=1000?(f/1000).toFixed(1)+' kHz':Math.round(f)+' Hz'}</strong> = <strong style="color:${ka>=0?'#4ade80':'#f87171'}">${ka>=0?'+':''}${ka.toFixed(1)} dB</strong>`;
  }
  inp.oninput=draw;draw();
}

// --- q09: Ebene vs Kugelwelle Animation ---
function ixQ09(el){
  const {ctx,w,h}=mkCanvas(el,300,140);
  let t=0;
  const mid=w/2;
  function draw(){
    ctx.clearRect(0,0,w,h);ctx.fillStyle='#0f172a';ctx.fillRect(0,0,w,h);
    // divider
    ctx.strokeStyle='rgba(148,163,184,.15)';ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.moveTo(mid,0);ctx.lineTo(mid,h);ctx.stroke();ctx.setLineDash([]);
    // plane wave (left)
    ctx.fillStyle='#94a3b8';ctx.font='bold 10px system-ui';ctx.fillText('Ebene Welle',10,14);
    for(let i=0;i<6;i++){
      const x=10+((t*40+i*25)%mid);
      ctx.strokeStyle=`rgba(167,139,250,0.7)`;ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(x,20);ctx.lineTo(x,h-10);ctx.stroke();
    }
    ctx.fillStyle='#64748b';ctx.font='9px system-ui';ctx.fillText('Amplitude = const',10,h-2);
    // spherical wave (right)
    ctx.fillStyle='#94a3b8';ctx.font='bold 10px system-ui';ctx.fillText('Kugelwelle',mid+10,14);
    const srcX=mid+20,srcY=h/2;
    ctx.beginPath();ctx.arc(srcX,srcY,3,0,Math.PI*2);ctx.fillStyle='#f59e0b';ctx.fill();
    for(let i=0;i<6;i++){
      const r=((t*40+i*25)%(mid-20));
      if(r<5)continue;
      const alpha=Math.max(0.1,0.8*(20/r));
      ctx.strokeStyle=`rgba(56,189,248,${alpha})`;ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(srcX,srcY,r,-.6,0.6);ctx.stroke();
    }
    ctx.fillStyle='#64748b';ctx.font='9px system-ui';ctx.fillText('Amplitude ∝ 1/r',mid+10,h-2);
    t+=1/60;
    activeAnims.push(requestAnimationFrame(draw));
  }
  draw();
}

// --- q12: Schallgeschwindigkeit c(T) ---

// --- q14: Amplitudenabfall-Vergleich ---
function ixQ14(el){
  const tabs=mkTabs(el,['Amplitude','Pegel (dB)'],draw);
  const {ctx,w,h}=mkCanvas(el,300,160);
  let mode=0;
  mkLegend(el,[{color:'#a78bfa',label:'Ebene (const)'},{color:'#38bdf8',label:'Kugel (1/r, −6dB)'},{color:'#f59e0b',label:'Zylinder (1/√r, −3dB)'}]);
  function draw(m){
    if(m!=null)mode=m;
    ctx.clearRect(0,0,w,h);ctx.fillStyle='#0f172a';ctx.fillRect(0,0,w,h);
    const pad={l:35,r:10,t:15,b:25};
    const pw=w-pad.l-pad.r,ph=h-pad.t-pad.b;
    // axes
    ctx.strokeStyle='rgba(148,163,184,.2)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(pad.l,pad.t);ctx.lineTo(pad.l,h-pad.b);ctx.lineTo(w-pad.r,h-pad.b);ctx.stroke();
    ctx.fillStyle='#475569';ctx.font='9px system-ui';
    ctx.fillText('r →',w-pad.r-15,h-pad.b+12);
    ctx.fillText(mode===0?'p̃':'Lp (dB)',2,pad.t+10);
    const curves=[
      {fn:r=>1,color:'#a78bfa'},
      {fn:r=>1/r,color:'#38bdf8'},
      {fn:r=>1/Math.sqrt(r),color:'#f59e0b'}
    ];
    const rMax=20;
    curves.forEach(cv=>{
      ctx.beginPath();ctx.strokeStyle=cv.color;ctx.lineWidth=2;
      for(let i=0;i<pw;i++){
        const r=1+i/pw*(rMax-1);
        let y;
        if(mode===0){y=pad.t+ph*(1-cv.fn(r));}
        else{const db=20*Math.log10(cv.fn(r));y=pad.t+ph*(-db/60);}
        if(y>h-pad.b)y=h-pad.b;
        i===0?ctx.moveTo(pad.l+i,y):ctx.lineTo(pad.l+i,y);
      }
      ctx.stroke();
    });
  }
  draw(0);
}

// --- q19: Snellius interaktiv ---
function ixQ19(el){
  const row=document.createElement('div');row.className='ix-row';
  const {inp,val}=mkSlider(row,{label:'Einfallswinkel θ₁',min:0,max:89,step:1,value:30});
  el.appendChild(row);
  const tabs=mkTabs(el,['Luft → Wasser (c₂>c₁)','Langsam → Schnell'],draw);
  const {ctx,w,h}=mkCanvas(el,300,180);
  const out=mkOut(el);
  let medium=0;
  function draw(m){
    if(m!=null)medium=m;
    const theta1=parseFloat(inp.value)*Math.PI/180;
    const c1=medium===0?343:343,c2=medium===0?1480:600;
    val.innerHTML=`θ₁ = <span>${Math.round(theta1*180/Math.PI)}°</span>`;
    ctx.clearRect(0,0,w,h);ctx.fillStyle='#0f172a';ctx.fillRect(0,0,w,h);
    const midY=h/2;
    // media
    ctx.fillStyle='rgba(56,189,248,0.05)';ctx.fillRect(0,0,w,midY);
    ctx.fillStyle='rgba(167,139,250,0.05)';ctx.fillRect(0,midY,w,h-midY);
    // interface
    ctx.strokeStyle='rgba(148,163,184,.3)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(0,midY);ctx.lineTo(w,midY);ctx.stroke();
    // labels
    ctx.fillStyle='#38bdf8';ctx.font='10px system-ui';ctx.fillText(`Medium 1: c₁=${c1} m/s`,5,14);
    ctx.fillStyle='#a78bfa';ctx.fillText(`Medium 2: c₂=${c2} m/s`,5,h-6);
    const hitX=w/2;
    // incident ray
    const len=80;
    const ix=hitX-len*Math.sin(theta1),iy=midY-len*Math.cos(theta1);
    ctx.strokeStyle='#f59e0b';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(ix,iy);ctx.lineTo(hitX,midY);ctx.stroke();
    // arrow
    ctx.fillStyle='#f59e0b';ctx.beginPath();
    const aAng=Math.atan2(midY-iy,hitX-ix);
    ctx.moveTo(hitX-10*Math.cos(aAng-0.3),midY-10*Math.sin(aAng-0.3));
    ctx.lineTo(hitX,midY);ctx.lineTo(hitX-10*Math.cos(aAng+0.3),midY-10*Math.sin(aAng+0.3));ctx.fill();
    // reflected
    const rx=hitX+len*Math.sin(theta1),ry=midY-len*Math.cos(theta1);
    ctx.strokeStyle='#ef4444';ctx.lineWidth=1.5;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(hitX,midY);ctx.lineTo(rx,ry);ctx.stroke();ctx.setLineDash([]);
    // refracted
    const sinT2=c2/c1*Math.sin(theta1);
    let totalRefl=sinT2>=1;
    if(!totalRefl){
      const theta2=Math.asin(sinT2);
      const tx=hitX+len*Math.sin(theta2),ty=midY+len*Math.cos(theta2);
      ctx.strokeStyle='#22c55e';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(hitX,midY);ctx.lineTo(tx,ty);ctx.stroke();
      out.innerHTML=`θ₂ = <strong>${(theta2*180/Math.PI).toFixed(1)}°</strong><br>sin(θ₁)/c₁ = sin(θ₂)/c₂ = <strong>${(Math.sin(theta1)/c1).toExponential(3)}</strong>`;
    }else{
      out.innerHTML=`<strong style="color:#ef4444">Totalreflexion!</strong> sin(θ₂) = ${sinT2.toFixed(3)} > 1<br>Grenzwinkel θ<sub>c</sub> = ${(Math.asin(c1/c2)*180/Math.PI).toFixed(1)}°`;
    }
    // normal
    ctx.strokeStyle='rgba(148,163,184,.2)';ctx.setLineDash([2,2]);ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(hitX,midY-60);ctx.lineTo(hitX,midY+60);ctx.stroke();ctx.setLineDash([]);
  }
  inp.oninput=()=>draw();draw(0);
  mkLegend(el,[{color:'#f59e0b',label:'Einfallend'},{color:'#ef4444',label:'Reflektiert'},{color:'#22c55e',label:'Gebrochen'}]);
}

// --- q20: Atmosphärische Brechung ---
function ixQ20(el){
  const tabs=mkTabs(el,['Normalfall (warm unten)','Inversion (kalt unten)'],draw);
  const {ctx,w,h}=mkCanvas(el,300,150);
  let inv=0;
  function draw(m){
    if(m!=null)inv=m;
    ctx.clearRect(0,0,w,h);ctx.fillStyle='#0f172a';ctx.fillRect(0,0,w,h);
    // ground
    ctx.fillStyle='rgba(34,197,94,0.15)';ctx.fillRect(0,h-15,w,15);
    ctx.fillStyle='#475569';ctx.font='9px system-ui';ctx.fillText('Boden',5,h-4);
    // temperature gradient
    const grad=ctx.createLinearGradient(0,20,0,h-15);
    if(inv===0){grad.addColorStop(0,'rgba(56,189,248,0.1)');grad.addColorStop(1,'rgba(239,68,68,0.1)');}
    else{grad.addColorStop(0,'rgba(239,68,68,0.1)');grad.addColorStop(1,'rgba(56,189,248,0.1)');}
    ctx.fillStyle=grad;ctx.fillRect(0,20,w,h-35);
    // T labels
    ctx.fillStyle=inv===0?'#ef4444':'#38bdf8';ctx.font='9px system-ui';ctx.fillText(inv===0?'warm':'kalt',w-30,h-20);
    ctx.fillStyle=inv===0?'#38bdf8':'#ef4444';ctx.fillText(inv===0?'kalt':'warm',w-30,30);
    // sound rays
    const srcX=30,srcY=h-25;
    ctx.fillStyle='#f59e0b';ctx.beginPath();ctx.arc(srcX,srcY,4,0,Math.PI*2);ctx.fill();
    for(let a=-0.3;a<=0.5;a+=0.15){
      ctx.beginPath();ctx.strokeStyle='rgba(245,158,11,0.7)';ctx.lineWidth=1.5;
      let x=srcX,y=srcY;
      const vx=Math.cos(a)*2,vy=-Math.sin(a)*2;
      let dx=vx,dy=vy;
      ctx.moveTo(x,y);
      for(let s=0;s<120;s++){
        const curve=inv===0?0.015:-0.015;// normal: bend up, inversion: bend down
        dy+=curve;
        x+=dx;y+=dy;
        if(y>=h-15||y<5)break;
        ctx.lineTo(x,y);
      }
      ctx.stroke();
    }
    // shadow zone
    if(inv===0){
      ctx.fillStyle='rgba(239,68,68,0.08)';ctx.fillRect(w*0.5,h-40,w*0.5,25);
      ctx.fillStyle='#ef4444';ctx.font='bold 10px system-ui';ctx.fillText('Schattenzone',w*0.55,h-22);
    }else{
      ctx.fillStyle='#22c55e';ctx.font='bold 10px system-ui';ctx.fillText('Schall breitet sich weit aus',w*0.3,h-22);
    }
  }
  draw(0);
  mkInfo(el,inv===0?'Normal: Schall biegt nach oben → Schattenzone in der Ferne':'Inversion: Schall biegt zum Boden → große Reichweite');
}

// --- q29: Absorbergrad-Plot ---
function ixQ29(el){
  const row=document.createElement('div');row.className='ix-row';
  const {inp:iD,val:vD}=mkSlider(row,{label:'Schichtdicke d (cm)',min:1,max:30,step:0.5,value:5});
  const {inp:iXi,val:vXi}=mkSlider(row,{label:'Ξ (Pa·s/m²)',min:3,max:4.7,step:0.01,value:3.7});
  el.appendChild(row);
  const {ctx,w,h}=mkCanvas(el,300,160);
  const out=mkOut(el);
  function draw(){
    const d=parseFloat(iD.value)/100;// m
    const Xi=Math.pow(10,parseFloat(iXi.value));
    vD.innerHTML=`d = <span>${(d*100).toFixed(1)} cm</span>`;
    vXi.innerHTML=`Ξ = <span>${Xi>=10000?(Xi/1000).toFixed(1)+'k':Math.round(Xi)}</span> Pa·s/m²`;
    const eps=Xi*d/412;
    ctx.clearRect(0,0,w,h);ctx.fillStyle='#0f172a';ctx.fillRect(0,0,w,h);
    const pad={l:30,r:10,t:10,b:25};
    const pw=w-pad.l-pad.r,ph=h-pad.t-pad.b;
    // axes
    ctx.strokeStyle='rgba(148,163,184,.2)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(pad.l,pad.t);ctx.lineTo(pad.l,h-pad.b);ctx.lineTo(w-pad.r,h-pad.b);ctx.stroke();
    ctx.fillStyle='#475569';ctx.font='9px system-ui';
    ctx.fillText('f (Hz)',w/2,h-3);ctx.fillText('α',pad.l-12,pad.t+12);
    [0,0.25,0.5,0.75,1].forEach(a=>{
      const y=h-pad.b-a*ph;
      ctx.fillText(a.toFixed(2),2,y+3);
      ctx.strokeStyle='rgba(148,163,184,.08)';ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(w-pad.r,y);ctx.stroke();
    });
    [100,250,500,1000,2000,5000].forEach(f=>{
      const x=pad.l+Math.log10(f/50)/Math.log10(10000/50)*pw;
      ctx.fillText(f>=1000?(f/1000)+'k':f,x-6,h-pad.b+12);
    });
    // simplified absorption model: α ≈ 1 - |(Zw-Z0)/(Zw+Z0)|² where Zw ≈ -jZ0*cot(keff*d)
    ctx.beginPath();ctx.strokeStyle='#a78bfa';ctx.lineWidth=2;
    for(let i=0;i<pw;i++){
      const f=50*Math.pow(10000/50,i/pw);
      const k=2*Math.PI*f/343;
      // effective complex k with losses: Im(k) ≈ k*Xi/(2*rho0*c*2*pi*f) simplified
      const loss=Xi/(2*412*2*Math.PI*f)*k;
      const kd=k*d;
      // simplified: alpha ≈ tanh(loss*d) * (1 + sin(2*kd)/(2*kd)) capped at 1
      let alpha=1-Math.exp(-2*loss*d);
      alpha=Math.min(1,alpha*(1+0.5*Math.sin(2*kd)/(kd+0.1)));
      alpha=Math.max(0,Math.min(1,alpha));
      const x=pad.l+i,y=h-pad.b-alpha*ph;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.stroke();
    out.innerHTML=`ε = Ξ·d/Z₀ = <strong>${eps.toFixed(2)}</strong> ${eps>0.8&&eps<4?'<span style="color:#4ade80">✓ optimal (1–3)</span>':'<span style="color:#64748b">(optimal: 1–3)</span>'}`;
  }
  iD.oninput=draw;iXi.oninput=draw;draw();
}

// --- q34: Nachhall-Abklingkurve ---
function ixQ34(el){
  const row=document.createElement('div');row.className='ix-row';
  const {inp,val}=mkSlider(row,{label:'Nachhallzeit T (s)',min:0.3,max:5,step:0.1,value:1.5});
  el.appendChild(row);
  const {ctx,w,h}=mkCanvas(el,300,160);
  let playing=false,tAnim=0;
  const pb=document.createElement('button');pb.className='ix-btn';pb.textContent='▶ Abklingen starten';
  pb.onclick=()=>{playing=!playing;tAnim=0;pb.textContent=playing?'⏸ Pause':'▶ Abklingen starten';if(playing)animate();};
  el.appendChild(pb);
  const pad={l:35,r:10,t:10,b:25};
  function drawCurve(){
    const T=parseFloat(inp.value);
    val.innerHTML=`T = <span>${T.toFixed(1)} s</span>`;
    ctx.clearRect(0,0,w,h);ctx.fillStyle='#0f172a';ctx.fillRect(0,0,w,h);
    const pw=w-pad.l-pad.r,ph=h-pad.t-pad.b;
    // axes
    ctx.strokeStyle='rgba(148,163,184,.2)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(pad.l,pad.t);ctx.lineTo(pad.l,h-pad.b);ctx.lineTo(w-pad.r,h-pad.b);ctx.stroke();
    ctx.fillStyle='#475569';ctx.font='9px system-ui';
    ctx.fillText('t (s)',w/2,h-3);ctx.fillText('Lp (dB)',1,pad.t+10);
    // dB scale
    const tMax=Math.max(T*1.5,2);
    [0,-20,-40,-60].forEach(db=>{
      const y=pad.t+(-db/70)*ph;
      ctx.fillText(db+'',2,y+3);
      ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(w-pad.r,y);ctx.stroke();
    });
    // 60 dB line
    const y60=pad.t+(60/70)*ph;
    ctx.strokeStyle='rgba(239,68,68,.3)';ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(pad.l,y60);ctx.lineTo(w-pad.r,y60);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='#ef4444';ctx.fillText('−60 dB',w-pad.r-30,y60-4);
    // T marker
    const xT=pad.l+(T/tMax)*pw;
    ctx.strokeStyle='rgba(167,139,250,.3)';ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(xT,pad.t);ctx.lineTo(xT,h-pad.b);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='#a78bfa';ctx.fillText('T',xT-3,h-pad.b+12);
    // decay curve
    ctx.beginPath();ctx.strokeStyle='#f59e0b';ctx.lineWidth=2;
    for(let i=0;i<=pw;i++){
      const t=i/pw*tMax;
      const db=-60*t/T;
      if(db<-70)break;
      const y=pad.t+(-db/70)*ph;
      i===0?ctx.moveTo(pad.l+i,y):ctx.lineTo(pad.l+i,y);
    }
    ctx.stroke();
    // animation cursor
    if(playing&&tAnim>0){
      const dbNow=-60*tAnim/T;
      if(dbNow>=-70){
        const xa=pad.l+(tAnim/tMax)*pw,ya=pad.t+(-dbNow/70)*ph;
        ctx.beginPath();ctx.arc(xa,ya,5,0,Math.PI*2);ctx.fillStyle='#a78bfa';ctx.fill();
      }
    }
  }
  function animate(){
    if(!playing)return;
    const T=parseFloat(inp.value);
    tAnim+=1/60;
    if(tAnim>T*1.5){playing=false;pb.textContent='▶ Abklingen starten';}
    drawCurve();
    if(playing)activeAnims.push(requestAnimationFrame(animate));
  }
  inp.oninput=drawCurve;drawCurve();
}

function ixQ35(el){
  const items=[
    {text:'Auspuff',correct:0},{text:'Lautsprecher',correct:0},

    el.innerHTML='';
    // categories

      const b=document.createElement('button');
      let cls='ix-quiz-item';
      if(selItem===i)cls+=' sel';
      if(assignments[i]!=null&&!checked)cls+=' placed';

// --- q40: Abstrahlimpedanz Zr(ka) ---
function ixQ40(el){
  const row=document.createElement('div');row.className='ix-row';
  const {inp,val}=mkSlider(row,{label:'ka (log)',min:-2,max:1.5,step:0.01,value:0});
  el.appendChild(row);
  const {ctx,w,h}=mkCanvas(el,300,160);
  const out=mkOut(el);
  mkLegend(el,[{color:'#f59e0b',label:'Re(Zr)/ρ₀c'},{color:'#38bdf8',label:'Im(Zr)/ρ₀c'}]);
  function draw(){
    const kaVal=Math.pow(10,parseFloat(inp.value));
    val.innerHTML=`ka = <span>${kaVal.toFixed(3)}</span>`;
    ctx.clearRect(0,0,w,h);ctx.fillStyle='#0f172a';ctx.fillRect(0,0,w,h);
    const pad={l:30,r:10,t:10,b:25};
    const pw=w-pad.l-pad.r,ph=h-pad.t-pad.b;
    ctx.strokeStyle='rgba(148,163,184,.2)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(pad.l,pad.t);ctx.lineTo(pad.l,h-pad.b);ctx.lineTo(w-pad.r,h-pad.b);ctx.stroke();
    ctx.fillStyle='#475569';ctx.font='9px system-ui';ctx.fillText('ka',w/2,h-3);
    [0,0.5,1].forEach(v=>{const y=h-pad.b-v*ph;ctx.fillText(v.toFixed(1),4,y+3);});
    // curves
    [
      {fn:ka=>(ka*ka)/(1+ka*ka),color:'#f59e0b'},
      {fn:ka=>ka/(1+ka*ka),color:'#38bdf8'}
    ].forEach(cv=>{
      ctx.beginPath();ctx.strokeStyle=cv.color;ctx.lineWidth=2;
      for(let i=0;i<=pw;i++){
        const ka=Math.pow(10,-2+3.5*i/pw);
        const v=cv.fn(ka);
        const x=pad.l+i,y=h-pad.b-v*ph;
        i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
      }
      ctx.stroke();
    });
    // marker
    const mx=pad.l+((Math.log10(kaVal)+2)/3.5)*pw;
    const reVal=(kaVal*kaVal)/(1+kaVal*kaVal);
    const imVal=kaVal/(1+kaVal*kaVal);
    ctx.beginPath();ctx.arc(mx,h-pad.b-reVal*ph,4,0,Math.PI*2);ctx.fillStyle='#f59e0b';ctx.fill();
    ctx.beginPath();ctx.arc(mx,h-pad.b-imVal*ph,4,0,Math.PI*2);ctx.fillStyle='#38bdf8';ctx.fill();
    const eff=kaVal>2?'effizient (ka≫1)':kaVal<0.3?'ineffizient (ka≪1)':'Übergang';
    out.innerHTML=`Re(Z<sub>r</sub>)/ρ₀c = <strong>${reVal.toFixed(3)}</strong> · Im(Z<sub>r</sub>)/ρ₀c = <strong>${imVal.toFixed(3)}</strong><br><span style="color:${kaVal>2?'#4ade80':kaVal<0.3?'#f87171':'#f59e0b'}">${eff}</span>`;
  }
  inp.oninput=draw;draw();
}

function ixQ49(el){
  const row=document.createElement('div');row.className='ix-row';
  const {inp:ikD,val:vkD}=mkSlider(row,{label:'kD (Helmholtz)',min:0.1,max:10,step:0.1,value:2});

// --- q51: Kolbenstrahler ---
function ixQ51(el){
  const row=document.createElement('div');row.className='ix-row';
  const {inp,val}=mkSlider(row,{label:'ka (Helmholtz-Zahl)',min:0.1,max:15,step:0.1,value:3});
  el.appendChild(row);
  const {ctx,w,h}=mkCanvas(el,240,240);
  // Bessel J1 approximation
  function J1(x){
    if(Math.abs(x)<1e-10)return 0;
    // polynomial approximation for small x, series for larger
    if(Math.abs(x)<4){
      let s=0,t=x/2;
      for(let k=0;k<20;k++){s+=((k%2===0?1:-1)*t)/(factorial(k)*factorial(k+1));t*=x*x/4;}
      return s;
    }
    // asymptotic
    return Math.sqrt(2/(Math.PI*x))*Math.cos(x-3*Math.PI/4);
  }
  function factorial(n){let r=1;for(let i=2;i<=n;i++)r*=i;return r;}
  // Better J1 using series
  function besselJ1(x){
    if(Math.abs(x)<1e-10)return 0;
    let sum=0,term=x/2;
    for(let m=0;m<25;m++){
      sum+=term;
      term*=-(x*x/4)/((m+1)*(m+2));
    }
    return sum;
  }
  function draw(){
    const ka=parseFloat(inp.value);
    val.innerHTML=`ka = <span>${ka.toFixed(1)}</span>`;
    const cx=w/2,cy=h/2,R=w/2-20;
    ctx.clearRect(0,0,w,h);ctx.fillStyle='#0f172a';ctx.fillRect(0,0,w,h);
    const pat=[{fn:t=>{
      const sinT=Math.sin(t);
      const arg=ka*sinT;
      if(Math.abs(arg)<1e-10)return 1;
      const v=2*besselJ1(arg)/arg;
      return Math.abs(v);
    },color:'#f59e0b',label:'Kolben'}];
    drawPolar(ctx,cx,cy,R,pat);
  }
  inp.oninput=draw;draw();
  mkInfo(el,'ka≪1: Monopol-artig · ka≫1: stark gebündelt (schmale Hauptkeule)');
}

// --- q53: Doppler-Animation ---
function ixQ53(el){
  const row=document.createElement('div');row.className='ix-row';
  const {inp,val}=mkSlider(row,{label:'Mach-Zahl M',min:0,max:0.9,step:0.01,value:0.4});
  el.appendChild(row);
  const {ctx,w,h}=mkCanvas(el,300,160);
  const out=mkOut(el);
  let t=0;
  function draw(){
    const M=parseFloat(inp.value);
    val.innerHTML=`M = <span>${M.toFixed(2)}</span> <small>(v = ${(M*343).toFixed(0)} m/s)</small>`;
    ctx.clearRect(0,0,w,h);ctx.fillStyle='#0f172a';ctx.fillRect(0,0,w,h);
    const cy=h/2;
    // source position cycles across canvas
    const period=5;// seconds for one crossing
    const srcX=((t%period)/period)*w;
    // emit circles at regular intervals
    const emitInterval=0.15;
    const nCircles=Math.floor(t/emitInterval);
    for(let i=Math.max(0,nCircles-30);i<=nCircles;i++){
      const emitTime=i*emitInterval;
      const emitX=((emitTime%period)/period)*w;
      const age=t-emitTime;
      if(age<0)continue;
      const r=age*60;// radius grows with time (represents c)
      if(r>w)continue;
      const alpha=Math.max(0.05,0.5-age*0.1);
      ctx.strokeStyle=`rgba(56,189,248,${alpha})`;ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(emitX,cy,r,0,Math.PI*2);ctx.stroke();
    }
    // source
    ctx.beginPath();ctx.arc(srcX,cy,5,0,Math.PI*2);ctx.fillStyle='#f59e0b';ctx.fill();
    // labels
    const fFront=1/(1-M),fBack=1/(1+M);
    ctx.fillStyle='#94a3b8';ctx.font='10px system-ui';
    ctx.fillText(`f_vorne: ×${fFront.toFixed(2)}`,w-90,16);
    ctx.fillText(`f_hinten: ×${fBack.toFixed(2)}`,5,16);
    out.innerHTML=`f<sub>empf</sub> = f₀ / (1 − M·cos ϑ)<br>Vorne: <strong style="color:#ef4444">×${fFront.toFixed(2)}</strong> · Hinten: <strong style="color:#22c55e">×${fBack.toFixed(2)}</strong>`;
    t+=1/60;
    activeAnims.push(requestAnimationFrame(draw));
  }
  draw();
}
